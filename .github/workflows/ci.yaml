---
name: CI

on:
  push:
    branches: [main]

  pull_request:

  workflow_dispatch:

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop -c bash --noprofile --norc -eo pipefail {0}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          lfs: true

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: DeterminateSystems/flake-checker-action@main

      - name: init nix devshell
        run: "true"

      - name: create private dependency token
        id: private-deps
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEPENDENCY_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEPENDENCY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ydks
            idl-repo
          permission-contents: read

      - name: configure private git auth
        run: |
          gh auth setup-git
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
        env:
          GH_TOKEN: ${{ steps.private-deps.outputs.token }}

      - uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - run: just sync
        env:
          GH_TOKEN: ${{ steps.private-deps.outputs.token }}
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - run: just check
      - run: just test
