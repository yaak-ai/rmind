# @package _global_

defaults:
  - /model: yaak/action_tokenizer/raw
  - /datamodule: yaak/action_train
  - /trainer: default
  - /trainer/callbacks: action_tokenizer
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

# VQ-BeT recipe: small codebooks + residual composition.
# resolution compounds as codebook_size ** num_quantizers → 16**4 ≈ 65k prototypes.
action_dim: 4
action_hidden_dim: 128
action_latent_dim: 384

codebook_size: 16
num_quantizers: 4
