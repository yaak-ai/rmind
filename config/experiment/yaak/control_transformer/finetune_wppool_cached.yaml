# @package _global_
#
# Transformer waypoint pooler (+ index PE) fine-tune WITH encoder-output caching.
# Same frozen episode_builder+encoder as `finetune_cached`, so it reuses the
# SAME cache (the pooler only changes downstream, trainable aggregation) -- use
# the same encoder_cache_fingerprint as the mean run to skip re-populating.
#
# Launch:
#   just train \
#     experiment=yaak/control_transformer/finetune_wppool_cached \
#     model.artifact=yaak/rmind/model-et584pft:v9 \
#     encoder_cache_fingerprint=yaak-train-v1

defaults:
  - /model: yaak/control_transformer/policy_finetune_wppool
  - /datamodule: yaak/train
  - /trainer: default
  - /trainer/callbacks: finetune_cached
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384

encoder_cache_fingerprint: ???
encoder_cache_dir: ${paths.rbyte.cache}/encoder_cache/${encoder_cache_fingerprint}
