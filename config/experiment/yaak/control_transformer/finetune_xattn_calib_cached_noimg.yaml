# @package _global_

# No-image variant of the cross-attention + calibration policy head fine-tune.
# Same as `finetune_xattn_cached_noimg` but points the model at
# `policy_finetune_xattn_calib` (CrossAttentionPolicyHead + BetaNLLLoss(0.5) on
# continuous heads + per-head loss weights). Swaps in the `yaak/train_noimg`
# datamodule (no `cam_front_left` JPEG decode) and the `finetune_cached_noimg`
# callbacks (drops the image-dependent WandbWaypointsLogger). Same cached tokens,
# so no cache change.
#
# USE ONLY WITH AN ALREADY-POPULATED ENCODER CACHE (see finetune_cached_noimg).
#
# Launch:
#   uv run rmind-train \
#     experiment=yaak/control_transformer/finetune_xattn_calib_cached_noimg \
#     model.artifact=yaak/rmind/model-et584pft:v9 \
#     encoder_cache_fingerprint=yaak-train-v1 \
#     paths.rbyte.cache=/nasa/max/rbyte_cache

defaults:
  - /model: yaak/control_transformer/policy_finetune_xattn_calib
  - /datamodule: yaak/train_noimg
  - /trainer: default
  - /trainer/callbacks: finetune_cached_noimg
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384

# Persistent (reusable across runs) cache directory + dataset fingerprint.
encoder_cache_fingerprint: ???
encoder_cache_dir: ${paths.rbyte.cache}/encoder_cache/${encoder_cache_fingerprint}
