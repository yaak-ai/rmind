# @package _global_

# 30-drive pilot + LDS + ACTION-HISTORY DROPOUT (anti-copycat).
#
# Motivation (action-history sensitivity probe + held-out mean-of-K
# decomposition, 2026-06-11): the policy leans heavily on past actions
# (perturbing them shifts predictions 1.7-3.4x the baseline error), and
# held-out spike steering error is ~pure bias (~0.6 even for the 32-draw
# conditional mean) — the model CONTINUES history instead of INITIATING
# maneuvers from vision/route. Classic copycat shortcut (de Haan et al. 2019,
# Causal Confusion; ChauffeurNet's past-motion dropout). Zeroing the action
# history for a random half of train samples forces the head to predict from
# observations alone on those samples, weakening the shortcut.
#
# Single change vs finetune_flow_pilot_lds (control: ge4vfboq). Readout:
# held-out maneuver_l1/steering and the spike-bias floor (flow_meank_eval on
# datamodule=yaak/predict_val) should drop if copycat was gating maneuver
# initiation; flat L1 may give a little back (history was a legitimate cruise
# feature). Also rerun the action-history probe on the result — the
# perturbation deltas should shrink. Sweep flow_action_hist_dropout (0.3/0.5/
# 0.8) without config edits.

defaults:
  - yaak/control_transformer/finetune_flow_pilot
  - override /trainer/callbacks: finetune_flow_histdrop
  - _self_

# LDS (the finetune_flow_pilot_lds set; transform + delta come from base).
flow_lds_stats: artifacts/action_norm_pilot.json
flow_lds_alpha: 0.5
flow_lds_cap: 15.0

# Dropout probability for the action-history fields (train batches only).
flow_action_hist_dropout: 0.5
