# @package _global_
#
# Policy fine-tune with the transformer waypoint pooler + index PE.
# Pair with a PT encoder that did NOT inject waypoint position (e.g.
# model-et584pft, dutiful-tree-122) so the pooler's own index PE is meaningful.
# Pass the PT checkpoint at launch: `model.artifact=yaak/rmind/model-<id>:<v>`.

defaults:
  - /model: yaak/control_transformer/policy_finetune_wppool
  - /datamodule: yaak/train
  - /trainer: default
  - /trainer/callbacks: finetune
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384
