# @package _global_

defaults:
  - /model: yaak/control_transformer/raw
  - /datamodule: yaak/train
  - /trainer: default
  - /trainer/callbacks: pretrain
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

num_heads: 4
num_layers: 8
encoder_embedding_dim: 384
image_embedding_dim: 384
sequence_length: 6
history_steps: ${sequence_length}
action_horizon: 1

speed_bins: 512
gas_pedal_bins: 255
brake_pedal_bins: 165
steering_angle_bins: 961
