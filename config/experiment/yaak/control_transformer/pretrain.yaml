# @package _global_

defaults:
  - /model: yaak/control_transformer/raw
  - /datamodule: yaak/train
  - /trainer: default
  - /trainer/callbacks: pretrain
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

num_heads: 4
num_layers: 8
encoder_embedding_dim: 384
image_embedding_dim: 384

episode_length: 6
action_horizon: 6
episode_step: 10
episode_stride: 10
clip_period: "${eval:'(${episode_length} + ${action_horizon} - 1) * ${episode_step}'}i"

speed_bins: 512
gas_pedal_bins: 255
brake_pedal_bins: 165
steering_angle_bins: 961
