# @package _global_

# No-image variant of `finetune_cached`. Identical except it swaps in the
# `yaak/train_noimg` datamodule (no `cam_front_left` JPEG decode) and the
# `finetune_cached_noimg` callbacks (drops the image-dependent WandbWaypointsLogger).
#
# USE ONLY WITH AN ALREADY-POPULATED ENCODER CACHE: on the cached fast path the
# step reads only `meta/sample_id` from the batch, so pixels are unused -- but if
# the cache is not yet populated, EncoderCachePopulator runs episode_builder on an
# image-less batch and crashes. Populate first via `finetune_cached` (with images),
# reusing the same `encoder_cache_fingerprint`.
#
# Launch:
#   uv run rmind-train \
#     experiment=yaak/control_transformer/finetune_cached_noimg \
#     model.artifact=yaak/rmind/model-et584pft:v9 \
#     encoder_cache_fingerprint=yaak-train-v1 \
#     paths.rbyte.cache=/nasa/max/rbyte_cache

defaults:
  - /model: yaak/control_transformer/policy_finetune
  - /datamodule: yaak/train_noimg
  - /trainer: default
  - /trainer/callbacks: finetune_cached_noimg
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384

# Persistent (reusable across runs) cache directory + dataset fingerprint.
encoder_cache_fingerprint: ???
encoder_cache_dir: ${paths.rbyte.cache}/encoder_cache/${encoder_cache_fingerprint}
