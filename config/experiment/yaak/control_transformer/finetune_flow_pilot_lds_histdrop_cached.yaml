# @package _global_

# CACHED histdrop arm: pilot LDS + action-history dropout (p=0.5) on the
# feature-cached path. Single change vs finetune_flow_pilot_lds_cached (the
# matched cached CONTROL — cached-vs-full comparisons are not step-matched, so
# the A/B must be cached-vs-cached). Dropout is EXACT under caching: the cache
# stores the history-zeroed condition variant per frame.

defaults:
  - yaak/control_transformer/finetune_flow_pilot_lds_cached
  - _self_

flow_action_hist_dropout: 0.5

wandb:
  project: action-flow
  tags: [flow, pilot-30, gauss-merge, lds, delta-loss, rope, hist-dropout, cached]
