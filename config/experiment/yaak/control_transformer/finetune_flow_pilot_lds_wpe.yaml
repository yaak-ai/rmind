# @package _global_

# 30-drive pilot + maneuver LDS + waypoint position embedding.
#
# = finetune_flow_pilot_lds PLUS the learnable per-waypoint-index PE. (Inherits
# the pilot base directly and re-sets the LDS flags inline — chaining
# experiment->experiment two levels deep trips a hydra relative-default path bug.)
#
# This is the meaningful test of "does waypoint ORDER matter": route diversity
# across 30 drives gives the per-index PE something to bite on (unlike the single
# overfit drive). The encoder is factorized (RoPE temporal-only; PR #209) so the
# 10 waypoints reach the flow decoder as an unordered bag distinguished only by a
# shared role embedding — this PE restores a within-frame route-sequence signal,
# in the trainable objective (the encoder is frozen). Zero-init => identical at
# start; the loss learns the offsets. Per-slot constant across timesteps => KV-
# cache safe.
#
# Run against finetune_flow_pilot_lds (the matched control, same alpha) — if the
# route sequence carries signal the bag was missing, expect sample_l1 /
# maneuver_l1/steering to improve on turns; if the point SET already suffices,
# expect ~no change (a clean null).

defaults:
  - yaak/control_transformer/finetune_flow_pilot
  - _self_

# Maneuver LDS (the finetune_flow_pilot_lds set; transform + delta come from base).
flow_lds_stats: artifacts/action_norm_pilot.json
flow_lds_alpha: 0.5
flow_lds_cap: 15.0

# Waypoint PE (1 = on; jq needs 1/0). waypoint_count must match the data (10).
flow_waypoint_pe: 1
flow_waypoint_count: 10

# Run tags (lever taxonomy; outcome tags like baseline/negative are set
# post-hoc on wandb when the run is logged to Notion).
wandb:
  project: action-flow
  tags: [flow, pilot-30, gauss-merge, lds, delta-loss, rope, waypoint-pe]
