# @package _global_

# No-image variant of `finetune_calib_cached`. Same calibration-robust fine-tune
# (Approach A4: BetaNLLLoss on the continuous heads), but swaps in the
# `yaak/train_noimg` datamodule (no `cam_front_left` JPEG decode) and the
# `finetune_cached_noimg` callbacks (drops the image-dependent WandbWaypointsLogger).
# Same frozen episode_builder+encoder, so it reuses the SAME cache -- use the same
# encoder_cache_fingerprint.
#
# USE ONLY WITH AN ALREADY-POPULATED ENCODER CACHE (see finetune_cached_noimg).
#
# Launch:
#   uv run rmind-train \
#     experiment=yaak/control_transformer/finetune_calib_cached_noimg \
#     model.artifact=yaak/rmind/model-et584pft:v9 \
#     encoder_cache_fingerprint=yaak-train-v1 \
#     paths.rbyte.cache=/nasa/max/rbyte_cache

defaults:
  - /model: yaak/control_transformer/policy_finetune_calib
  - /datamodule: yaak/train_noimg
  - /trainer: default
  - /trainer/callbacks: finetune_cached_noimg
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384

# Persistent (reusable across runs) cache directory + dataset fingerprint.
encoder_cache_fingerprint: ???
encoder_cache_dir: ${paths.rbyte.cache}/encoder_cache/${encoder_cache_fingerprint}
