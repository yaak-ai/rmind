# @package _global_

# Slot-conditioned AdaLN variant of the flow overfit experiment.
#
# Problem it targets: the 6-step chunk is constant-in-expectation / mid-anchored
# (per-horizon L1 is U-shaped, slots interchangeable) because slot identity has
# ~4e-4 of the loss and its only channel — the additive position embedding —
# stays at init, while the flow-time AdaLN modulation trains strongly. This
# routes slot identity through that proven-to-train channel: a zero-init
# per-slot offset is added to the time embedding feeding every block's
# adaLN_modulation, so each slot gets its own scale/shift. Zero-init => starts
# byte-identical to the time-only decoder; the loss learns the per-slot offsets.
#
# Readouts vs the base run: per-horizon spike L1 should flatten (lose the
# mid-anchor U), the fan lag profile move off h-3, chunk slope ratio -> 1.
# (pe_drift may stay ~0 here — that's fine; identity now flows through AdaLN,
# not the additive PE.)

defaults:
  - yaak/control_transformer/finetune_overfit_flow
  - _self_

flow_decoder_slot_adaln: 1

# Run tags (lever taxonomy; outcome tags like baseline/negative are set
# post-hoc on wandb when the run is logged to Notion).
wandb:
  tags: [flow, overfit, slot-adaln, delta-loss, rope]
