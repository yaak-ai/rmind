# @package _global_

defaults:
  - /model: yaak/control_transformer/policy_finetune
  - /datamodule: yaak/train
  - /trainer: default
  - /trainer/callbacks: finetune
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384

# Policy feature flags — pass via ++policy_use_speed=1 etc.
# use_speed and use_action_summary are mutually exclusive
policy_use_speed: 0
policy_use_action_summary: 0
policy_use_observation_history: 1
policy_use_trunk: 0

# log_var clamp for GaussianNLLLoss — prevents variance explosion/underflow
# pass null to disable, e.g. ++policy_log_var_clamp_min=null
policy_log_var_clamp_min: -10
policy_log_var_clamp_max: 10

# use ActivityWeightedGaussianNLLLoss instead of plain GaussianNLLLoss
# pass ++policy_activity_weighted_loss=1 to enable
policy_activity_weighted_loss: 0
policy_activity_weight: 5.0

# per-sample loss weighting strategy: "none" | "activity" (|target|) | "delta" (|target_t - target_{t-1}|)
policy_loss_weighting: "none"

policy_use_waypoints: 1
policy_use_raw_waypoints: 0
policy_relative_waypoints: 0

# dropout after trunk features — set p > 0 to enable, e.g. ++policy_dropout_p=0.1
policy_dropout_p: 0
