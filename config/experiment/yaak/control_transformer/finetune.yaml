# @package _global_

defaults:
  - /model: yaak/control_transformer/policy_finetune
  - /datamodule: yaak/train
  - /trainer: default
  - /trainer/callbacks: finetune
  - /paths: yaak/default
  - /wandb: yaak/rmind
  - _self_

encoder_embedding_dim: 384

episode_length: 6
action_horizon: 6
episode_step: 10
episode_stride: 10

clip_period: "${eval:'(${episode_length} + ${action_horizon} - 1) * ${episode_step}'}i"

action_tokenizer_artifact: ???
