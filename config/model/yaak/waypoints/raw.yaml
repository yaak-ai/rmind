_target_: rmind.models.waypoints_tokenizer.WaypointsTokenizer
_recursive_: false
_convert_: all


input_transform:
  _target_: rmind.components.nn.Remapper
  paths:
    waypoints: [data, waypoints/xy_normalized]

waypoints: [waypoints]
num_waypoints: ${num_waypoints}
waypoint_dim: ${waypoint_dim}

encoder:
  _target_: torch.nn.Sequential
  _args_:
    - _target_: rmind.components.nn.Linear
      in_features: ${waypoint_input_dim}
      out_features: ${waypoint_hidden_dim}
    - _target_: torch.nn.GELU
    - _target_: rmind.components.nn.Linear
      in_features: ${waypoint_hidden_dim}
      out_features: ${waypoint_latent_dim}

quantizer:
  _target_: rmind.components.vq.ResidualVQ
  dim: ${waypoint_latent_dim}
  codebook_size: ${codebook_size}
  num_quantizers: ${num_quantizers}

decoder:
  _target_: torch.nn.Sequential
  _args_:
    - _target_: rmind.components.nn.Linear
      in_features: ${waypoint_latent_dim}
      out_features: ${waypoint_hidden_dim}
    - _target_: torch.nn.GELU
    - _target_: rmind.components.nn.Linear
      in_features: ${waypoint_hidden_dim}
      out_features: ${waypoint_input_dim}

vq_weight: 5.0

optimizer:
  _target_: rmind.components.optimizers.SelectiveAdamW
  _recursive_: true
  lr: 5.5e-5
  betas: [0.9, 0.95]
  weight_decay: 0.1
  weight_decay_module_blacklist:
    - _target_: hydra.utils.get_class
      path: torch.nn.Embedding
    - _target_: hydra.utils.get_class
      path: torch.nn.LayerNorm

lr_scheduler:
  interval: step
  scheduler:
    _target_: rmind.components.lr_schedulers.get_cosine_schedule_with_warmup
    num_warmup_steps: 2500
    num_training_steps: 50000
