---
# Same as policy_finetune_relative_traj_longitudinal_weighted_detach_h_traj,
# plus ("continuous", "speed") appended to feature_keys (see
# policy_finetune_drop_history_rawdino_speed_weighted.yaml:37) — speed becomes
# a full pooled feature part (384-dim, same as every other feature_keys
# entry), not a scalar concatenation like condition_steering_on_speed. It
# feeds into `features` itself, so trajectory_head is affected too, not just
# the action heads. in_features grows 1152->1536 (4 parts instead of 3) for
# every head that reads features/heads_features: gas_pedal, brake_pedal,
# steering_angle, turn_signal, longitudinal_mode_head, AND trajectory_head.
# Warm-starting from a checkpoint without the speed feature shape-mismatches
# all of their hidden_proj projections, so those are added to
# state_dict_drop alongside the existing yaw-channel drop (trajectory_head's
# input_proj/output_proj, from predict_yaw).
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
strict: false
state_dict_drop:
  - objectives\.policy\.trajectory_head\.(input_proj|output_proj|hidden_proj)\.
  - objectives\.policy\.heads\..*\.hidden_proj\.
  - objectives\.policy\.longitudinal_mode_head\.hidden_proj\.
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.PolicyObjective",
        "history_steps": 5,
        "action_horizon": 6,
        "feature_keys": [
          ["summary", "observation_summary"],
          ["summary", "observation_history"],
          ["context", "waypoints"],
          ["continuous", "speed"]
        ],
        "norm": {
          "_target_": "torch.nn.LayerNorm",
          "normalized_shape": 384
        },
        "heads": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1536,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "brake_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1536,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "steering_angle": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1536,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1536,
                "hidden_size": 384,
                "out_features": 3,
                "num_steps": 6
              }
            }
          }
        },
        "longitudinal_mode_head": {
          "_target_": "rmind.components.nn.GRUHead",
          "in_features": 1536,
          "hidden_size": 384,
          "out_features": 3,
          "num_steps": 6
        },
        "longitudinal_mode_loss": {
          "_target_": "torch.nn.CrossEntropyLoss"
        },
        "longitudinal_mode_loss_weight": ${longitudinal_mode_loss_weight},
        "longitudinal_press_threshold": ${longitudinal_press_threshold},
        "detach_h_traj": true,
        "targets": {
          "continuous": {
            "gas_pedal": ["input", "continuous", "gas_pedal"],
            "brake_pedal": ["input", "continuous", "brake_pedal"],
            "steering_angle": ["input", "continuous", "steering_angle"]
          },
          "discrete": {
            "turn_signal": ["input", "discrete", "turn_signal"]
          }
        },
        "trajectory_head": {
          "_target_": "rmind.components.nn.GRUTrajectoryHead",
          "in_features": 1536,
          "hidden_size": 384,
          "num_steps": 6,
          "predict_yaw": true
        },
        "trajectory_loss": {
          "_target_": "rmind.components.loss.GaussianNLLLoss"
        },
        "trajectory_loss_weight": ${trajectory_loss_weight},
        "trajectory_target": "relative",
        "xy_key": ["input", "trajectory", "xy"],
        "heading_key": ["input", "trajectory", "heading"],
        "losses": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              },
              "brake_pedal": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              },
              "steering_angle": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.loss.LogitBiasCrossEntropyLoss"
              }
            }
          }
        }
      }
    }
  }
  | .episode_builder.input_transform._args_[0].paths.trajectory = {
    "xy": ["data", "meta/Gnss/xy"],
    "heading": ["data", "headings_denoised/heading"]
  }
  | .episode_builder.input_transform._args_[1].modules.trajectory = {
    "_target_": "torch.nn.Identity"
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": ${lr_warmup_steps},
      "num_training_steps": ${lr_training_steps}
    }
  }
