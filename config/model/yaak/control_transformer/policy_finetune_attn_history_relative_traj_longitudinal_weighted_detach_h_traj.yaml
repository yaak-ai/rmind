---
# Same as policy_finetune_drop_history_relative_traj_longitudinal_weighted_detach_h_traj,
# plus history_feature_keys/history_feature_pool: observation_summary is
# additionally attended over the last `history_steps` (5) ticks via a
# learned-query cross-attention pool (AttentionPoolHead — same mechanism
# already used elsewhere for pooling spatial image patches, just applied
# across time instead), giving a trainable, unfrozen read of history on top
# of whatever the frozen encoder's own observation_history token captures.
# PatchPositionEmbedding2D(grid_size=(5, 1)) doubles as the temporal position
# embedding for the window (n=1 token/tick for observation_summary).
#
# in_features: feature_keys (observation_summary, waypoints) = 2 parts, 768
# + 1 history_feature_keys part (windowed observation_summary) = 1152 total
# — this happens to exactly match yaak/rmind/model-et584pft:v9's original
# 1152-dim (3-part, full-history) hidden_proj everywhere, so (unlike the
# plain drop_history_detach_h_traj base file) NO hidden_proj drop is needed
# for heads/trajectory_head this time — only the usual trajectory_head
# yaw-channel drop (pose_dim 2->3) applies. history_feature_pool.* is a
# brand-new key (not in the checkpoint at all), so it needs no drop either.
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
strict: false
state_dict_drop:
  - objectives\.policy\.trajectory_head\.(input_proj|output_proj)\.
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.PolicyObjective",
        "history_steps": 5,
        "action_horizon": 6,
        "feature_keys": [
          ["summary", "observation_summary"],
          ["context", "waypoints"]
        ],
        "history_feature_keys": [
          ["summary", "observation_summary"]
        ],
        "history_feature_pool": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "summary": {
              "observation_summary": {
                "_target_": "rmind.components.transformer.AttentionPoolHead",
                "embedding_dim": 384,
                "patch_pos_embed": {
                  "_target_": "rmind.components.position_encoding.PatchPositionEmbedding2D",
                  "grid_size": [5, 1],
                  "embedding_dim": 384
                },
                "decoder": {
                  "_target_": "rmind.components.transformer.CrossAttentionDecoder",
                  "dim_model": 384,
                  "num_layers": 1,
                  "num_heads": 4,
                  "attn_dropout": 0.1,
                  "resid_dropout": 0.1,
                  "mlp_dropout": 0.1,
                  "hidden_layer_multiplier": 1
                }
              }
            }
          }
        },
        "norm": {
          "_target_": "torch.nn.LayerNorm",
          "normalized_shape": 384
        },
        "heads": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "brake_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "steering_angle": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 3,
                "num_steps": 6
              }
            }
          }
        },
        "longitudinal_mode_head": {
          "_target_": "rmind.components.nn.GRUHead",
          "in_features": 1152,
          "hidden_size": 384,
          "out_features": 3,
          "num_steps": 6
        },
        "longitudinal_mode_loss": {
          "_target_": "torch.nn.CrossEntropyLoss"
        },
        "longitudinal_mode_loss_weight": ${longitudinal_mode_loss_weight},
        "longitudinal_press_threshold": ${longitudinal_press_threshold},
        "detach_h_traj": true,
        "targets": {
          "continuous": {
            "gas_pedal": ["input", "continuous", "gas_pedal"],
            "brake_pedal": ["input", "continuous", "brake_pedal"],
            "steering_angle": ["input", "continuous", "steering_angle"]
          },
          "discrete": {
            "turn_signal": ["input", "discrete", "turn_signal"]
          }
        },
        "trajectory_head": {
          "_target_": "rmind.components.nn.GRUTrajectoryHead",
          "in_features": 1152,
          "hidden_size": 384,
          "num_steps": 6,
          "predict_yaw": true
        },
        "trajectory_loss": {
          "_target_": "rmind.components.loss.GaussianNLLLoss"
        },
        "trajectory_loss_weight": ${trajectory_loss_weight},
        "trajectory_target": "relative",
        "xy_key": ["input", "trajectory", "xy"],
        "heading_key": ["input", "trajectory", "heading"],
        "losses": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              },
              "brake_pedal": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              },
              "steering_angle": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.loss.LogitBiasCrossEntropyLoss"
              }
            }
          }
        }
      }
    }
  }
  | .episode_builder.input_transform._args_[0].paths.trajectory = {
    "xy": ["data", "meta/Gnss/xy"],
    "heading": ["data", "headings_denoised/heading"]
  }
  | .episode_builder.input_transform._args_[1].modules.trajectory = {
    "_target_": "torch.nn.Identity"
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": ${lr_warmup_steps},
      "num_training_steps": ${lr_training_steps}
    }
  }
