---
# policy_finetune_drop_history with gas and brake coupled through one 3-class
# longitudinal mode head (coast/gas/brake): the softmax makes the press decision
# mutually exclusive by construction (independent heads let brake ride during
# launches — rsim's brake-gas mutex then zeroes fired gas), and both pedals show
# the same zero-inflated mean-split failure (see gas_stall_report.md P1).
# Pedal heads stay 2-channel [mean, log_var] and model magnitude only
# (MaskedGaussianNLLLoss trains them on pressed samples); the mode CE trains on
# all samples. Warm-start from a 2-channel-head checkpoint (e.g.
# model-xxdl5j0k:v9) — the mode head is new and initializes randomly
# (strict: false); NOT from a hurdle checkpoint (3-channel gas output_proj
# would shape-mismatch).
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
strict: false
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.PolicyObjective",
        "history_steps": 5,
        "action_horizon": 6,
        "feature_keys": [
          ["summary", "observation_summary"],
          ["context", "waypoints"]
        ],
        "norm": {
          "_target_": "torch.nn.LayerNorm",
          "normalized_shape": 384
        },
        "heads": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 768,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "brake_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 768,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "steering_angle": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 768,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 768,
                "hidden_size": 384,
                "out_features": 3,
                "num_steps": 6
              }
            }
          }
        },
        "longitudinal_mode_head": {
          "_target_": "rmind.components.nn.GRUHead",
          "in_features": 768,
          "hidden_size": 384,
          "out_features": 3,
          "num_steps": 6
        },
        "longitudinal_mode_loss": {
          "_target_": "torch.nn.CrossEntropyLoss"
        },
        "longitudinal_mode_loss_weight": ${longitudinal_mode_loss_weight},
        "longitudinal_press_threshold": ${longitudinal_press_threshold},
        "targets": {
          "continuous": {
            "gas_pedal": ["input", "continuous", "gas_pedal"],
            "brake_pedal": ["input", "continuous", "brake_pedal"],
            "steering_angle": ["input", "continuous", "steering_angle"]
          },
          "discrete": {
            "turn_signal": ["input", "discrete", "turn_signal"]
          }
        },
        "trajectory_head": {
          "_target_": "rmind.components.nn.GRUTrajectoryHead",
          "in_features": 768,
          "hidden_size": 384,
          "num_steps": 6
        },
        "trajectory_loss": {
          "_target_": "rmind.components.loss.GaussianNLLLoss"
        },
        "trajectory_loss_weight": ${trajectory_loss_weight},
        "xy_key": ["input", "trajectory", "xy"],
        "heading_key": ["input", "trajectory", "heading"],
        "losses": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.loss.MaskedGaussianNLLLoss",
                "press_threshold": ${longitudinal_press_threshold}
              },
              "brake_pedal": {
                "_target_": "rmind.components.loss.MaskedGaussianNLLLoss",
                "press_threshold": ${longitudinal_press_threshold}
              },
              "steering_angle": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.loss.LogitBiasCrossEntropyLoss"
              }
            }
          }
        }
      }
    }
  }
  | .episode_builder.input_transform._args_[0].paths.trajectory = {
    "xy": ["data", "meta/Gnss/xy"],
    "heading": ["data", "headings_denoised/heading"]
  }
  | .episode_builder.input_transform._args_[1].modules.trajectory = {
    "_target_": "torch.nn.Identity"
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": ${lr_warmup_steps},
      "num_training_steps": ${lr_training_steps}
    }
  }
