---
# export/finetuned.yaml + P0 horizon-max hurdle-gate decode: fire when the gate
# crosses threshold anywhere in the predicted horizon instead of only the next
# tick — per-tick gates fire in 1-tick bursts closed loop (see gas_stall_report.md)
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
filename: model.ckpt
map_location: cpu
strict: false
hparams_jq: |
  delpaths([
    paths | select(.. | type == "string" and endswith("_diff")),
    ["episode_builder", "input_transform", "_args_", 1]
  ])
  | .objectives.modules.policy.gate_horizon_aggregate = "max"
  | .objectives.modules.policy.gate_fire_threshold = ${oc.select:gate_fire_threshold,0.5}
