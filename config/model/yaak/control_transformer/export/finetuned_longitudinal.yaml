---
# export/finetuned.yaml, wrapped so the exported ONNX graph also emits the
# coupled longitudinal mode head's coast/gas/brake probabilities under the
# output name `mode.probs` — see rmind.models.export.PolicyLongitudinalModeExportWrapper.
_target_: rmind.models.export.PolicyLongitudinalModeExportWrapper
model:
  _target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
  artifact: ???
  filename: model.ckpt
  map_location: cpu
  strict: false
  hparams_jq: |
    delpaths([
      paths | select(.. | type == "string" and endswith("_diff")),
      ["episode_builder", "input_transform", "_args_", 1]
    ])
