---
# Same as policy_finetune_relative_traj_longitudinal_weighted_detach_h_traj,
# plus HistoryViewpointPerturbation (rmind.components.augment): at the last
# history tick, with probability viewpoint_aug_probability, synthetically
# yaws the forward image by up to +-viewpoint_aug_max_degrees and adds the
# same offset to trajectory.heading, so build_relative_trajectory's first
# predicted step reads as "recover, then resume the recorded path" -- see
# augment.py's docstring for why this stays in the small-angle regime
# instead of swapping in a real ~70 deg side camera (no physically
# consistent steering target exists for that big a jump).
#
# The checkpoint this loads was pretrained under raw.yaml before this
# augmentation existed, so episode_builder.input_transform._args_ doesn't
# have it yet -- appended at _args_[2] (index 2 is guaranteed unused: this
# feature didn't exist when any current artifact was pretrained), not
# inserted between _args_[0]/_args_[1], which ~20 sibling configs patch by
# fixed index.
#
# dyaw_key/steering_correction_gain nudge the *action-head* steering_angle
# GT to agree with that implicit trajectory correction instead of
# contradicting it with the real, unperturbed recorded continuation (see
# PolicyObjective._apply_steering_correction). Both viewpoint_aug_* and
# steering_correction_gain default to 0.0/off in finetune.yaml -- override
# both to actually run this.
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
strict: false
state_dict_drop:
  - objectives\.policy\.trajectory_head\.(input_proj|output_proj)\.
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.PolicyObjective",
        "history_steps": 5,
        "action_horizon": 6,
        "norm": {
          "_target_": "torch.nn.LayerNorm",
          "normalized_shape": 384
        },
        "heads": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "brake_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "steering_angle": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1152,
                "hidden_size": 384,
                "out_features": 3,
                "num_steps": 6
              }
            }
          }
        },
        "longitudinal_mode_head": {
          "_target_": "rmind.components.nn.GRUHead",
          "in_features": 1152,
          "hidden_size": 384,
          "out_features": 3,
          "num_steps": 6
        },
        "longitudinal_mode_loss": {
          "_target_": "torch.nn.CrossEntropyLoss"
        },
        "longitudinal_mode_loss_weight": ${longitudinal_mode_loss_weight},
        "longitudinal_press_threshold": ${longitudinal_press_threshold},
        "detach_h_traj": true,
        "targets": {
          "continuous": {
            "gas_pedal": ["input", "continuous", "gas_pedal"],
            "brake_pedal": ["input", "continuous", "brake_pedal"],
            "steering_angle": ["input", "continuous", "steering_angle"]
          },
          "discrete": {
            "turn_signal": ["input", "discrete", "turn_signal"]
          }
        },
        "trajectory_head": {
          "_target_": "rmind.components.nn.GRUTrajectoryHead",
          "in_features": 1152,
          "hidden_size": 384,
          "num_steps": 6,
          "predict_yaw": true
        },
        "trajectory_loss": {
          "_target_": "rmind.components.loss.GaussianNLLLoss"
        },
        "trajectory_loss_weight": ${trajectory_loss_weight},
        "trajectory_target": "relative",
        "xy_key": ["input", "trajectory", "xy"],
        "heading_key": ["input", "trajectory", "heading"],
        "dyaw_key": ["input", "viewpoint_aug", "dyaw"],
        "steering_correction_gain": ${steering_correction_gain},
        "steering_correction_decay_steps": ${steering_correction_decay_steps},
        "losses": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              },
              "brake_pedal": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              },
              "steering_angle": {
                "_target_": "rmind.components.loss.ActivityWeightedGaussianNLLLoss",
                "activity_weight": ${activity_weight}
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.loss.LogitBiasCrossEntropyLoss"
              }
            }
          }
        }
      }
    }
  }
  | .episode_builder.input_transform._args_[0].paths.trajectory = {
    "xy": ["data", "meta/Gnss/xy"],
    "heading": ["data", "headings_denoised/heading"]
  }
  | .episode_builder.input_transform._args_[1].modules.trajectory = {
    "_target_": "torch.nn.Identity"
  }
  | .episode_builder.input_transform._args_[2] = {
    "_target_": "rmind.components.augment.HistoryViewpointPerturbation",
    "image_key": ["image", "cam_front_left"],
    "heading_key": ["trajectory", "heading"],
    "pivot_index": 4,
    "probability": ${viewpoint_aug_probability},
    "max_degrees": ${viewpoint_aug_max_degrees},
    "reference_width": 576,
    "reference_height": 320,
    "fov_degrees": 110.0
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": ${lr_warmup_steps},
      "num_training_steps": ${lr_training_steps}
    }
  }
