---
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
strict: false
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.PolicyObjective",
        "use_speed": (${policy_use_speed} != 0),
        "use_action_summary": (${policy_use_action_summary} != 0),
        "use_observation_history": (${policy_use_observation_history} != 0),
        "trunk": (if ${policy_use_trunk} != 0 then {
          "_target_": "torchvision.ops.MLP",
          "in_channels": 1152,
          "hidden_channels": [512, 384],
          "bias": false
        } else null end),
        "norm": {
          "_target_": "torch.nn.LayerNorm",
          "normalized_shape": 384
        },
        "heads": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "torchvision.ops.MLP",
                "in_channels": (if ${policy_use_trunk} != 0 then 384 else 1152 end),
                "hidden_channels": [384, 2],
                "bias": false
              },
              "brake_pedal": {
                "_target_": "torchvision.ops.MLP",
                "in_channels": (if ${policy_use_trunk} != 0 then 384 else 1152 end),
                "hidden_channels": [384, 2],
                "bias": false
              },
              "steering_angle": {
                "_target_": "torchvision.ops.MLP",
                "in_channels": (if ${policy_use_trunk} != 0 then 384 else 1152 end),
                "hidden_channels": [384, 2],
                "bias": false
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "torchvision.ops.MLP",
                "in_channels": (if ${policy_use_trunk} != 0 then 384 else 1152 end),
                "hidden_channels": [384, 3],
                "bias": false
              }
            }
          }
        },
        "targets": {
          "continuous": {
            "gas_pedal": ["input", "continuous", "gas_pedal"],
            "brake_pedal": ["input", "continuous", "brake_pedal"],
            "steering_angle": ["input", "continuous", "steering_angle"]
          },
          "discrete": {
            "turn_signal": ["input", "discrete", "turn_signal"]
          }
        },
        "losses": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": ({"_target_": (if ${policy_activity_weighted_loss} != 0 then "rmind.components.loss.ActivityWeightedGaussianNLLLoss" else "rmind.components.loss.GaussianNLLLoss" end), "log_var_clamp": (if ${policy_log_var_clamp_min} != null then [${policy_log_var_clamp_min}, ${policy_log_var_clamp_max}] else null end)} + (if ${policy_activity_weighted_loss} != 0 then {"activity_weight": ${policy_activity_weight}} else {} end)),
              "brake_pedal": ({"_target_": (if ${policy_activity_weighted_loss} != 0 then "rmind.components.loss.ActivityWeightedGaussianNLLLoss" else "rmind.components.loss.GaussianNLLLoss" end), "log_var_clamp": (if ${policy_log_var_clamp_min} != null then [${policy_log_var_clamp_min}, ${policy_log_var_clamp_max}] else null end)} + (if ${policy_activity_weighted_loss} != 0 then {"activity_weight": ${policy_activity_weight}} else {} end)),
              "steering_angle": ({"_target_": (if ${policy_activity_weighted_loss} != 0 then "rmind.components.loss.ActivityWeightedGaussianNLLLoss" else "rmind.components.loss.GaussianNLLLoss" end), "log_var_clamp": (if ${policy_log_var_clamp_min} != null then [${policy_log_var_clamp_min}, ${policy_log_var_clamp_max}] else null end)} + (if ${policy_activity_weighted_loss} != 0 then {"activity_weight": ${policy_activity_weight}} else {} end))
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.loss.LogitBiasCrossEntropyLoss"
              }
            }
          }
        }
      }
    }
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": 25000,
      "num_training_steps": 250000
    }
  }
