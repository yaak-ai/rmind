---
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
strict: false
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.FlowPolicyObjective",
        "history_steps": ${history_steps},
        "flow_time_sampling": "${flow_time_sampling}",
        "validation_seed": ${flow_validation_seed},
        "validation_sample_metrics": true,
        "loss": {
          "_target_": "torch.nn.MSELoss"
        },
        "decoder": {
          "_target_": "rmind.components.transformer.FlowActionDecoder",
          "condition_dim": ${encoder_embedding_dim},
          "dim_model": ${flow_decoder_embedding_dim},
          "action_horizon": ${action_horizon},
          "flow_sampling_steps": ${flow_sampling_steps},
          "flow_sampling_method": "${flow_sampling_method}",
          "time_embedding_scale": 1000.0,
          "time_logit_scale": 0.25,
          "num_layers": 2,
          "num_heads": 4,
          "attn_dropout": 0.1,
          "resid_dropout": 0.1,
          "mlp_dropout": 0.1,
          "hidden_layer_multiplier": 1
        }
      }
    }
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": ${lr_warmup_steps},
      "num_training_steps": ${lr_training_steps}
    }
  }
