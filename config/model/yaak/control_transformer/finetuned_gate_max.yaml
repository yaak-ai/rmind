# finetuned.yaml + P0 horizon-max hurdle-gate decode: the per-tick gate fires in
# 1-tick bursts (AUC ~0.72 at onsets); firing when the gate crosses threshold
# anywhere in the predicted horizon is an easier decision and holds the press
# over the approach (see gas_stall_report.md)
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: ???
filename: model.ckpt
hparams_jq: |
  delpaths([
    ["objectives", "policy", "losses"]
  ])
  | .objectives.modules.policy.gate_horizon_aggregate = "max"
  | .objectives.modules.policy.gate_fire_threshold = 0.5
