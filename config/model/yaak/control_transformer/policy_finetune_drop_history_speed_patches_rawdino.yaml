---
# Observation-audit follow-up (2026-07-09/10): the visual spot-check found missed
# launches with a fully legible, static cue (e.g. a green light unchanged across
# the entire history window) that the gate still misses. Every finetune to date
# freezes both episode_builder (incl. embeddings.image = DINOv3, and
# projections.image) and encoder — so the AUC ceiling was always measured against
# a visual representation that was never adapted to this task, and heads only ever
# saw patches *after* the (also frozen) fusion encoder pooled/attended over them.
#
# This config adds one thing on top of the trained speed+patches baseline
# (yaak/alex-tmp/model-52imllxu:v9): a second image feature read straight from
# episode.input_embeddings — i.e. DINOv3's raw patch output, before the frozen
# encoder gets to fuse/attend over it. Still fully frozen, no new trainable vision
# weights — this is a cheap diagnostic: if bypassing the encoder's fusion step
# helps, the cue was being lost in fusion, not in DINOv3 itself. Everything else
# (heads, losses, feature_pool for the post-encoder patches) is unchanged from
# policy_finetune_drop_history_speed_patches.yaml.
_target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
artifact: yaak/alex-tmp/model-52imllxu:v9
strict: false
# in_features grew 1536->1920 (one more 384-dim block: the raw-dino feature) —
# only hidden_proj (the head's first projection) is shape-incompatible with the
# checkpoint; gru/output_proj/traj_proj/step_embed are untouched and warm-start
# normally.
state_dict_drop:
  - objectives\.policy\.heads\..*\.hidden_proj\.
  - objectives\.policy\.trajectory_head\.hidden_proj\.
hparams_jq: |
  .objectives = {
    "_target_": "rmind.components.containers.ModuleDict",
    "modules": {
      "policy": {
        "_target_": "rmind.components.objectives.PolicyObjective",
        "history_steps": 5,
        "action_horizon": 6,
        "feature_keys": [
          ["summary", "observation_summary"],
          ["context", "waypoints"],
          ["continuous", "speed"],
          ["image", "cam_front_left"]
        ],
        "feature_pool": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "image": {
              "cam_front_left": {
                "_target_": "rmind.components.transformer.AttentionPoolHead",
                "embedding_dim": 384,
                "patch_pos_embed": {
                  "_target_": "rmind.components.position_encoding.PatchPositionEmbedding2D",
                  "grid_size": [16, 16],
                  "embedding_dim": 384
                },
                "decoder": {
                  "_target_": "rmind.components.transformer.CrossAttentionDecoder",
                  "dim_model": 384,
                  "num_layers": 1,
                  "num_heads": 4,
                  "attn_dropout": 0.1,
                  "resid_dropout": 0.1,
                  "mlp_dropout": 0.1,
                  "hidden_layer_multiplier": 1
                }
              }
            }
          }
        },
        "raw_feature_keys": [
          ["image", "cam_front_left"]
        ],
        "raw_feature_pool": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "image": {
              "cam_front_left": {
                "_target_": "rmind.components.transformer.AttentionPoolHead",
                "embedding_dim": 384,
                "patch_pos_embed": {
                  "_target_": "rmind.components.position_encoding.PatchPositionEmbedding2D",
                  "grid_size": [16, 16],
                  "embedding_dim": 384
                },
                "decoder": {
                  "_target_": "rmind.components.transformer.CrossAttentionDecoder",
                  "dim_model": 384,
                  "num_layers": 1,
                  "num_heads": 4,
                  "attn_dropout": 0.1,
                  "resid_dropout": 0.1,
                  "mlp_dropout": 0.1,
                  "hidden_layer_multiplier": 1
                }
              }
            }
          }
        },
        "norm": {
          "_target_": "torch.nn.LayerNorm",
          "normalized_shape": 384
        },
        "heads": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1920,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "brake_pedal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1920,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              },
              "steering_angle": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1920,
                "hidden_size": 384,
                "out_features": 2,
                "num_steps": 6
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.nn.GRUHead",
                "in_features": 1920,
                "hidden_size": 384,
                "out_features": 3,
                "num_steps": 6
              }
            }
          }
        },
        "targets": {
          "continuous": {
            "gas_pedal": ["input", "continuous", "gas_pedal"],
            "brake_pedal": ["input", "continuous", "brake_pedal"],
            "steering_angle": ["input", "continuous", "steering_angle"]
          },
          "discrete": {
            "turn_signal": ["input", "discrete", "turn_signal"]
          }
        },
        "trajectory_head": {
          "_target_": "rmind.components.nn.GRUTrajectoryHead",
          "in_features": 1920,
          "hidden_size": 384,
          "num_steps": 6
        },
        "trajectory_loss": {
          "_target_": "rmind.components.loss.GaussianNLLLoss"
        },
        "trajectory_loss_weight": ${trajectory_loss_weight},
        "xy_key": ["input", "trajectory", "xy"],
        "heading_key": ["input", "trajectory", "heading"],
        "losses": {
          "_target_": "rmind.components.containers.ModuleDict",
          "modules": {
            "continuous": {
              "gas_pedal": {
                "_target_": "rmind.components.loss.GaussianNLLLoss"
              },
              "brake_pedal": {
                "_target_": "rmind.components.loss.GaussianNLLLoss"
              },
              "steering_angle": {
                "_target_": "rmind.components.loss.GaussianNLLLoss"
              }
            },
            "discrete": {
              "turn_signal": {
                "_target_": "rmind.components.loss.LogitBiasCrossEntropyLoss"
              }
            }
          }
        }
      }
    }
  }
  | .episode_builder.input_transform._args_[0].paths.trajectory = {
    "xy": ["data", "meta/Gnss/xy"],
    "heading": ["data", "headings_denoised/heading"]
  }
  | .episode_builder.input_transform._args_[1].modules.trajectory = {
    "_target_": "torch.nn.Identity"
  }
  | .lr_scheduler = {
    "interval": "step",
    "scheduler": {
      "_target_": "rmind.components.lr_schedulers.get_cosine_schedule_with_warmup",
      "num_warmup_steps": 25000,
      "num_training_steps": 250000
    }
  }
