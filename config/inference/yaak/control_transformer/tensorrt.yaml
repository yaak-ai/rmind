# @package _global_
---
defaults:
  - /model: yaak/control_transformer/tensorrt
  - _self_

drive_dir: ???

# match drahve timestamping behaviour
time_index:
  index: "[:, 0]"

# TensorRT model was exported with these dimensions
episode_length: 6
clip_horizon: 0
clip_length: 6
episode_stride: 10
episode_step: 10
clip_period: "${eval:'${clip_length} * ${episode_step}'}i"

datamodule:
  _target_: rmind.datamodules.GenericDataModule
  predict:
    _target_: rbyte.dataloader.TorchDataNodeDataLoader
    batch_size: 1
    shuffle: false
    collate_fn:
      _target_: rbyte.types.Batch.to_dict
      _partial_: true

    num_workers: 1
    pin_memory: false
    method: thread
    dataset:
      _target_: rbyte.Dataset.from_config
      _recursive_: false
      _convert_: all
      streams:
        cam_front_left:
          index: meta/ImageMetadata.cam_front_left/frame_idx
          sources:
            drive:
              _target_: rbyte.io.TorchCodecFrameSource
              source: ${drive_dir}/cam_front_left.pii.mp4
              dimension_order: NCHW
              output_dtype:
                _target_: hydra.utils.get_object
                path: torch.float32
              device: cpu
              num_ffmpeg_threads: 0
              transforms:
                - _target_: torchvision.transforms.v2.Resize
                  size: [324, 576]
                - _target_: torchvision.transforms.v2.CenterCrop
                  size: [320, 576]
                - _target_: torchvision.transforms.v2.Resize
                  size: [256, 256]

      samples:
        inputs:
          input_id: [drive]
          meta_path: ["${drive_dir}/metadata.log"]
          waypoints_path: ["${drive_dir}/waypoints.json"]

        parallel: false

        pipeline:
          _target_: pipefunc.Pipeline
          validate_type_annotations: false
          cache_type: disk
          cache_kwargs:
            cache_dir: /tmp/rbyte_cache
          functions:
            - _target_: pipefunc.PipeFunc
              renames:
                path: meta_path
              output_name: meta
              mapspec: "${.renames.path}[i] -> ${.output_name}[i]"
              cache: true
              func:
                _target_: rbyte.io.YaakMetadataDataFrameBuilder
                fields:
                  rbyte.io.yaak.proto.sensor_pb2.ImageMetadata:
                    time_stamp:
                      _target_: polars.Datetime
                      time_unit: us
                    frame_idx:
                      _target_: polars.Int32
                    camera_name:
                      _target_: polars.Enum
                      categories:
                      - cam_front_center
                      - cam_front_left
                      - cam_front_right
                      - cam_left_forward
                      - cam_right_forward
                      - cam_left_backward
                      - cam_right_backward
                      - cam_rear
                  rbyte.io.yaak.proto.can_pb2.VehicleState:
                    time_stamp:
                      _target_: polars.Datetime
                      time_unit: us
                    turn_signal:
                      _target_: polars.Int64
                  rbyte.io.yaak.proto.can_pb2.VehicleMotion:
                    time_stamp:
                      _target_: polars.Datetime
                      time_unit: us
                    speed:
                      _target_: polars.Float32
                    gas_pedal_normalized:
                      _target_: polars.Float32
                    brake_pedal_normalized:
                      _target_: polars.Float32
                    steering_angle_normalized:
                      _target_: polars.Float32
                    gear:
                      _target_: polars.Enum
                      categories:
                      - "0"
                      - "1"
                      - "2"
                      - "3"
                  rbyte.io.yaak.proto.sensor_pb2.Gnss:
                    time_stamp:
                      _target_: polars.Datetime
                      time_unit: us
                    latitude:
                      _target_: polars.Float32
                    longitude:
                      _target_: polars.Float32

            - _target_: pipefunc.PipeFunc
              output_name: waypoints_raw
              mapspec: waypoints_path[i] -> waypoints_raw[i]
              func:
                _target_: makefun.create_function
                func_signature: build_waypoints(*, waypoints_path)
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  extensions:
                  - spatial
                  config:
                    TimeZone: UTC
                  query: |
                    SELECT TO_TIMESTAMP(timestamp)::TIMESTAMP AS timestamp,
                           ST_AsWKB(ST_Transform(geom, 'EPSG:4326', 'EPSG:25832', always_xy := true)) AS geometry
                    FROM ST_Read($waypoints_path)

            - _target_: pipefunc.PipeFunc
              renames:
                input: waypoints_raw
              output_name: waypoints
              mapspec: waypoints_raw[i] -> waypoints[i]
              func:
                _target_: rbyte.io.WaypointBuilder
                length: 91
                columns:
                  points: geometry
                  output: xy

            - _target_: pipefunc.PipeFunc
              output_name: aligned
              mapspec: "meta[i], waypoints[i] -> ${.output_name}[i]"
              func:
                _target_: makefun.create_function
                func_signature: "align(*, meta, waypoints)"
                func_impl:
                  _target_: rbyte.io.DataFrameAligner
                  separator: /
                  fields:
                    meta:
                      ImageMetadata.cam_front_left:
                        key: time_stamp
                      VehicleState:
                        key: time_stamp
                        columns:
                          turn_signal:
                            method: asof
                            tolerance: 100ms
                      VehicleMotion:
                        key: time_stamp
                        columns:
                          speed:
                            method: interp
                          gas_pedal_normalized:
                            method: interp
                          brake_pedal_normalized:
                            method: interp
                          steering_angle_normalized:
                            method: interp
                          gear:
                            method: asof
                            tolerance: 100ms
                            strategy: nearest
                      Gnss:
                        key: time_stamp
                        columns:
                          latitude:
                            method: asof
                            tolerance: 500ms
                            strategy: nearest
                          longitude:
                            method: asof
                            tolerance: 500ms
                            strategy: nearest
                    waypoints:
                      key: timestamp
                      columns:
                        xy:
                          method: asof
                          strategy: forward

            - _target_: pipefunc.PipeFunc
              output_name: filtered
              mapspec: "aligned[i] -> ${.output_name}[i]"
              func:
                _target_: makefun.create_function
                func_signature: "filter(*, aligned)"
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  extensions:
                  - spatial
                  query: |
                    WITH
                      base_data AS (
                        SELECT
                          *,
                          ST_Transform(
                            ST_Point("meta/Gnss/longitude", "meta/Gnss/latitude"),
                            'EPSG:4326', 'EPSG:25832', always_xy := true
                          ) AS ego_geom,
                          ST_GeomFromWKB("waypoints/xy") AS waypoints_geom
                        FROM
                          aligned
                        WHERE
                          aligned."meta/VehicleMotion/gear" == '3'
                          AND aligned."meta/VehicleMotion/speed" BETWEEN 0.0 AND 130.0
                          AND aligned."meta/VehicleMotion/gas_pedal_normalized" BETWEEN 0.0 AND 1.0
                          AND aligned."meta/VehicleMotion/brake_pedal_normalized" BETWEEN 0.0 AND 1.0
                          AND aligned."meta/VehicleMotion/steering_angle_normalized" BETWEEN -1.0 AND 1.0
                          AND COLUMNS(*) IS NOT NULL
                      ),
                      normalized_geometries AS (
                        SELECT
                          *,
                          ST_Rotate(
                            ST_Translate(
                              waypoints_geom,
                              - ST_X(ego_geom),
                              - ST_Y(ego_geom)
                            ),
                            radians(0)
                          ) AS normalized_waypoints_geom
                        FROM
                          base_data
                      )
                    SELECT
                      * EXCLUDE (
                        "meta/VehicleMotion/gear",
                        "meta/VehicleMotion/brake_pedal_normalized",
                        waypoints_geom,
                        normalized_waypoints_geom,
                        ego_geom,
                        "waypoints/xy"
                      ),
                      IF(
                        "meta/VehicleMotion/brake_pedal_normalized" < 0.05
                        AND "meta/VehicleMotion/gas_pedal_normalized" > 0.0,
                        0.0,
                        "meta/VehicleMotion/brake_pedal_normalized"
                      ) AS "meta/VehicleMotion/brake_pedal_normalized",
                      [
                        ST_X(ego_geom),
                        ST_Y(ego_geom)
                      ] AS "meta/Gnss/xy",
                      (
                        SELECT
                          list(
                            [ST_X(p.point_struct.geom), ST_Y(p.point_struct.geom)]
                            ORDER BY
                              p.point_struct.path
                          )
                        FROM
                          UNNEST(ST_Dump(waypoints_geom)) AS p(point_struct)
                        WHERE (p.point_struct.path[1] - 1) % 10 = 0
                      ) AS "waypoints/xy",
                      (
                        SELECT
                          list(
                            [ST_X(p.point_struct.geom) / 100, ST_Y(p.point_struct.geom) / 100]
                            ORDER BY
                              p.point_struct.path
                          )
                        FROM
                          UNNEST(ST_Dump(normalized_waypoints_geom)) AS p(point_struct)
                        WHERE (p.point_struct.path[1] - 1) % 10 = 0
                      ) AS "waypoints/xy_normalized"
                    FROM
                      normalized_geometries
                    WHERE
                      ST_Contains(
                        ST_MakeEnvelope(-150, -150, 150, 150),
                        normalized_waypoints_geom
                      )
                    ORDER BY
                      "meta/ImageMetadata.cam_front_left/time_stamp";

            - _target_: pipefunc.PipeFunc
              renames:
                input: filtered
              output_name: samples
              mapspec: filtered[i] -> samples[i]
              func:
                _target_: rbyte.io.DataFrameGroupByDynamic
                index_column: meta/ImageMetadata.cam_front_left/frame_idx
                every: 10i
                period: 60i
                closed: left
                gather_every: 10

            - _target_: pipefunc.PipeFunc
              output_name: samples_cast
              mapspec: samples[i] -> samples_cast[i]
              func:
                _target_: makefun.create_function
                func_signature: cast(*, samples)
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  query: |
                    SELECT
                        "meta/ImageMetadata.cam_front_left/time_stamp"[1:6]::TIMESTAMP[6] AS "meta/ImageMetadata.cam_front_left/time_stamp",
                        "meta/ImageMetadata.cam_front_left/frame_idx"[1:6]::INT32[6] AS "meta/ImageMetadata.cam_front_left/frame_idx",
                        "meta/VehicleMotion/speed"[1:6]::FLOAT[6] AS "meta/VehicleMotion/speed",
                        "meta/Gnss/xy"[1:6]::FLOAT[2][6] AS "meta/Gnss/xy",
                        "waypoints/xy_normalized"[1:6]::FLOAT[2][10][6] AS "waypoints/xy_normalized",
                        "waypoints/xy"[1:6]::FLOAT[2][10][6] AS "waypoints/xy",
                        "meta/VehicleMotion/gas_pedal_normalized"[1:6]::FLOAT[6] AS "meta/VehicleMotion/gas_pedal_normalized",
                        "meta/VehicleMotion/brake_pedal_normalized"[1:6]::FLOAT[6] AS "meta/VehicleMotion/brake_pedal_normalized",
                        "meta/VehicleMotion/steering_angle_normalized"[1:6]::FLOAT[6] AS "meta/VehicleMotion/steering_angle_normalized",
                        "meta/VehicleState/turn_signal"[1:6]::BIGINT[6] AS "meta/VehicleState/turn_signal"
                    FROM
                        samples
                    WHERE
                        len("meta/ImageMetadata.cam_front_left/frame_idx") = 6
                        AND list_last("meta/ImageMetadata.cam_front_left/frame_idx") - list_first("meta/ImageMetadata.cam_front_left/frame_idx") == 50
                        AND NOT (
                            list_max("meta/VehicleMotion/gas_pedal_normalized") <= (1.0 / 255 + 0.001)
                            AND list_max("meta/VehicleMotion/brake_pedal_normalized") <= (1.0 / 164 + 0.001)
                            AND list_max("meta/VehicleMotion/speed") >= 25.0
                            AND list_last("meta/VehicleMotion/speed") - list_first("meta/VehicleMotion/speed") >= -0.05 * list_avg("meta/VehicleMotion/speed")
                        )
                        AND len(list_filter(
                            list_zip(
                                "meta/VehicleMotion/gas_pedal_normalized",
                                "meta/VehicleMotion/brake_pedal_normalized"
                            ),
                            x -> x[1] > (1.0 / 255 + 0.001)
                                 AND x[2] > (1.0 / 164 + 0.001)
                        )) = 0

            - _target_: pipefunc.PipeFunc
              renames:
                keys: input_id
                values: samples_cast
              output_name: samples_aggregated
              func:
                _target_: rbyte.io.DataFrameConcater
                key_column: input_id

trainer:
  _target_: pytorch_lightning.Trainer
  _convert_: all
  accelerator: gpu
  devices: 1
  benchmark: true
  precision: "bf16-mixed"
  logger: false
  callbacks:
    - _target_: rmind.callbacks.PredictionConfigSetter
      config:
        objectives: [prediction_value]

    - _target_: rmind.callbacks.RerunPredictionWriter
      write_interval: batch
      logger:
        _target_: rbyte.viz.loggers.RerunLogger
        _convert_: all
        _recursive_: false
        application_id: test
        recording_id: test
        recording_name: test
        entity_path_format: "/{}/rmind"
        schema:
          gst/buffer/pts:
            _target_: rerun.TimeColumn
            columns:
              duration: [batch, data, meta/ImageMetadata.cam_front_left/time_stamp]
            dtype: timedelta64[us]

          episode/camera/cam_front_left/5:
            - _target_: rerun.Image.columns
              columns:
                buffer:
                  path: [batch, data, cam_front_left]
                  index: "[:, 5, ...]"
              time_index: ${time_index}

            - static: true
              _target_: rerun.Image.from_fields
              fields:
                format:
                  _target_: rerun.components.ImageFormat
                  color_model: RGB
                  channel_datatype: f32
                  height: 256
                  width: 256

          episode/meta/gas_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/gas_pedal_normalized]
              time_index: ${time_index}

          episode/meta/brake_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/brake_pedal_normalized]
              time_index: ${time_index}

          episode/meta/steering_angle_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/steering_angle_normalized]
              time_index: ${time_index}

          episode/meta/speed:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/speed]
              time_index: ${time_index}

          episode/meta/turn_signal:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleState/turn_signal]
              time_index: ${time_index}

          episode/waypoints/xy_normalized:
            - _target_: rerun.LineStrips3D.columns
              columns:
                strips: [batch, data, waypoints/xy_normalized]
              time_index: ${time_index}

          prediction/tensorrt/gas_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, continuous, gas_pedal]
              time_index: ${time_index}

          prediction/tensorrt/brake_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, continuous, brake_pedal]
              time_index: ${time_index}

          prediction/tensorrt/steering_angle_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, continuous, steering_angle]
              time_index: ${time_index}

          prediction/tensorrt/turn_signal:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, discrete, turn_signal]
              time_index: ${time_index}
