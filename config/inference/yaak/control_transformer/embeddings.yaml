# @package _global_

defaults:
  - /model: yaak/control_transformer/pretrained
  - /datamodule: yaak/predict
  - /paths: yaak/default
  - _self_

# Dataset windowing for the /datamodule predict dataset. Mirrors the pretrain
# experiment: a flat history window (sequence_length == history_steps), so no
# future action chunk is sliced. Keeps the pretrained model's sampling unchanged.
history_steps: 6
action_horizon: 6
sequence_length: ${history_steps}

output_dir: ???

trainer:
  _target_: pytorch_lightning.Trainer
  accelerator: gpu
  devices: 1
  benchmark: true
  precision: "bf16-mixed"
  logger: false
  callbacks:
    - _target_: rmind.callbacks.PredictionConfigSetter
      config:
        objectives:
          - summary_embeddings

    - _target_: rmind.callbacks.TensorDictPredictionWriter
      write_interval: batch
      path: ${hydra:run.dir}/predictions/{batch_idx:06}/
      writer:
        _target_: tensordict.memmap
        _partial_: true
        copy_existing: true

    - _target_: pytorch_lightning.callbacks.ModelSummary
      max_depth: 5
datamodule:
  predict:
    shuffle: true
