# @package _global_
---
defaults:
  - /model: yaak/control_transformer/pretrained
  - /datamodule: yaak/predict
  - /paths: yaak/default
  - /logger: yaak/rerun/prediction_pretrain
  - _self_

# Dataset windowing for the /datamodule predict dataset. Mirrors the pretrain
# experiment: a flat history window (sequence_length == history_steps), so no
# future action chunk is sliced. Keeps the pretrained model's sampling unchanged.
history_steps: 6
action_horizon: 6
sequence_length: ${history_steps}

model:
  hparams_jq: |
    delpaths([
      ["objectives", "inverse_dynamics", "losses"],
      ["objectives", "forward_dynamics", "losses"],
      ["objectives", "memory_extraction", "losses"],
      ["lr_scheduler"]
    ])
    | setpath(
        ["episode_builder", "input_transform", "_args_", 0, "paths", "context", "waypoints"];
        ["data", "waypoints/xy_normalized"]
    )

trainer:
  _target_: pytorch_lightning.Trainer
  _convert_: all
  accelerator: gpu
  devices: 1
  benchmark: true
  precision: "bf16-mixed"
  logger: false
  callbacks:
    - _target_: rmind.callbacks.PredictionConfigSetter
      config:
        objectives:
          - ground_truth
          - prediction_value
          - score_l1
          - score_logprob
          - summary_embeddings

    - _target_: rmind.callbacks.RerunPredictionWriter
      write_interval: batch
      logger: ${logger}
