# @package _global_
---
defaults:
  - /model: yaak/control_transformer/drahve
  - _self_

drive_dir: ???

# match drahve timestamping behaviour
time_index:
  index: "[:, 0]"

datamodule:
  _target_: rmind.datamodules.GenericDataModule
  predict:
    _target_: rbyte.dataloader.TorchDataNodeDataLoader
    batch_size: 1
    shuffle: false
    collate_fn:
      _target_: rbyte.types.Batch.to_dict
      _partial_: true

    num_workers: 1
    pin_memory: false
    method: thread
    dataset:
      _target_: rbyte.Dataset.from_config
      _recursive_: false
      _convert_: all
      streams:
        cam_front_left:
          index: meta/ImageMetadata.cam_front_left/frame_idx
          sources:
            drive:
              _target_: rbyte.io.TorchCodecFrameSource
              source: ${drive_dir}/cam_front_left.pii.mp4
              custom_frame_mappings: ${drive_dir}/cam_front_left.pii.mp4.frames.json
              dimension_order: NCHW
              output_dtype:
                _target_: hydra.utils.get_object
                path: torch.float32
              device: cpu
              num_ffmpeg_threads: 0
              transforms:
                - _target_: torchcodec.transforms.Resize
                  size: [256, 256]

      samples:
        inputs:
          input_id: [drive]
          meta_path: ["${drive_dir}/metadata.log"]
          route_path: ["${drive_dir}/map-matched.json"]
          cam_front_left_path: ["${drive_dir}/cam_front_left.pii.mp4"]

        parallel: false

        pipeline:
          _target_: pipefunc.Pipeline
          validate_type_annotations: false
          cache_type: disk
          cache_kwargs:
            cache_dir: /tmp/rbyte_cache
          functions:
            - _target_: pipefunc.PipeFunc
              renames:
                path: meta_path
              output_name: meta
              mapspec: "${.renames.path}[i] -> ${.output_name}[i]"
              cache: true
              func:
                _target_: rbyte.io.YaakMetadataDataFrameBuilder
                messages:
                  ImageMetadata:
                    session_timestamp:
                      _target_: polars.UInt64
                    frame_idx:
                      _target_: polars.Int32
                    camera_name:
                      _target_: polars.Enum
                      categories:
                        - cam_front_center
                        - cam_front_left
                        - cam_front_right
                        - cam_left_forward
                        - cam_right_forward
                        - cam_left_backward
                        - cam_right_backward
                        - cam_rear

                  VehicleMotion:
                    session_timestamp:
                      _target_: polars.UInt64
                    speed:
                      _target_: polars.Float32
                    gas_pedal_normalized:
                      _target_: polars.Float32
                    brake_pedal_normalized:
                      _target_: polars.Float32
                    steering_angle_normalized:
                      _target_: polars.Float32

                  VehicleState:
                    session_timestamp:
                      _target_: polars.UInt64
                    turn_signal:
                      _target_: polars.Int32

                  Gnss:
                    session_timestamp:
                      _target_: polars.UInt64
                    latitude:
                      _target_: polars.Float64
                    longitude:
                      _target_: polars.Float64
                    heading:
                      _target_: polars.Float64

            - _target_: pipefunc.PipeFunc
              renames:
                path: cam_front_left_path
              output_name: cam_front_left_meta
              mapspec: "${.renames.path}[i] -> ${.output_name}[i]"
              cache: true
              func:
                _target_: rbyte.io.VideoDataFrameBuilder
                fields:
                  frame_idx:
                    _target_: polars.Int32

            - _target_: pipefunc.PipeFunc
              renames:
                mapping: meta
              output_name: gnss
              mapspec: "${.renames.mapping}[i] -> ${.output_name}[i]"
              func:
                _target_: rbyte.io.TreeItemGetter
                key_path: [Gnss]

            - _target_: pipefunc.PipeFunc
              output_name: route
              mapspec: "route_path[i] -> ${.output_name}[i]"
              cache: true
              func:
                _target_: makefun.create_function
                func_signature: "build_route(*, route_path)"
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  extensions: [spatial]
                  config:
                    TimeZone: UTC
                  query: |
                    WITH coordinates AS (
                      SELECT coordinate, ordinality
                      FROM read_json_auto($route_path),
                           UNNEST(features[1].geometry.coordinates) WITH ORDINALITY
                             AS coordinates(coordinate, ordinality)
                    ),
                    route_metric AS (
                      SELECT
                        ST_Transform(
                          ST_Point(coordinate[1], coordinate[2]),
                          'EPSG:4326', 'EPSG:25832', always_xy := true
                        ) AS geom,
                        ordinality
                      FROM coordinates
                    )
                    SELECT
                      ST_X(geom) AS easting,
                      ST_Y(geom) AS northing
                    FROM route_metric
                    ORDER BY ordinality

            - _target_: pipefunc.PipeFunc
              output_name: gnss_metric
              mapspec: "gnss[i] -> ${.output_name}[i]"
              func:
                _target_: makefun.create_function
                func_signature: "build_gnss_metric(*, gnss)"
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  extensions: [spatial]
                  config:
                    TimeZone: UTC
                  query: |
                    WITH projected AS (
                      SELECT
                        * EXCLUDE (latitude, longitude),
                        ST_Transform(
                          ST_Point(longitude, latitude),
                          'EPSG:4326', 'EPSG:25832', always_xy := true
                        ) AS geom
                      FROM gnss
                    )
                    SELECT
                      session_timestamp,
                      ST_X(geom) AS easting,
                      ST_Y(geom) AS northing,
                      heading
                    FROM projected
                    WHERE COLUMNS(*) IS NOT NULL
                    ORDER BY session_timestamp

            - _target_: pipefunc.PipeFunc
              renames:
                gnss: gnss_metric
              output_name: waypoints
              mapspec: "route[i], ${.renames.gnss}[i] -> ${.output_name}[i]"
              func:
                _target_: rbyte.io.RouteMatchedWaypointGenerator
                config:
                  waypoint_offsets_m: [1, 11, 21, 31, 41, 51, 61, 71, 81, 91]
                  search:
                    preferred_match_radius_m: 100.0
                    beam_width: 64
                    max_backtrack_m: 5.0
                    max_advance_m: 45.0
                  weights:
                    distance: 1.0
                    route_heading: 5.0
                    advance: 0.1
                    backtrack: 25.0

            - _target_: pipefunc.PipeFunc
              output_name: aligned
              mapspec: "meta[i], waypoints[i] -> ${.output_name}[i]"
              func:
                _target_: makefun.create_function
                func_signature: "align(*, meta,  waypoints)"
                func_impl:
                  _target_: rbyte.io.DataFrameAligner
                  separator: /
                  fields:
                    meta:
                      ImageMetadata.cam_front_left:
                        key: session_timestamp

                      VehicleMotion:
                        key: session_timestamp
                        columns:
                          speed:
                            method: asof
                            strategy: backward
                          gas_pedal_normalized:
                            method: asof
                            strategy: backward
                          brake_pedal_normalized:
                            method: asof
                            strategy: backward
                          steering_angle_normalized:
                            method: asof
                            strategy: backward

                      VehicleState:
                        key: session_timestamp
                        columns:
                          turn_signal:
                            method: asof
                            strategy: backward

                      Gnss:
                        key: session_timestamp
                        columns:
                          heading:
                            method: asof
                            strategy: backward

                          latitude:
                            method: asof
                            strategy: backward

                          longitude:
                            method: asof
                            strategy: backward

                    waypoints:
                      key: session_timestamp
                      columns:
                        easting:
                          method: asof
                          strategy: backward

                        northing:
                          method: asof
                          strategy: backward

                        heading:
                          method: asof
                          strategy: backward

                        waypoints/position:
                          method: asof
                          strategy: backward

            - _target_: pipefunc.PipeFunc
              output_name: filtered
              mapspec: "aligned[i], cam_front_left_meta[i] -> ${.output_name}[i]"
              func:
                _target_: makefun.create_function
                func_signature: "filter(*, aligned, cam_front_left_meta)"
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  extensions: [spatial]
                  query: |
                    WITH
                      base_data AS (
                        SELECT
                          *,
                          ST_Point("waypoints/easting", "waypoints/northing") AS ego_geom,
                          ST_Collect(
                            (
                              SELECT list(
                                ST_Point(position[1], position[2])
                                ORDER BY ordinality
                              )
                              FROM UNNEST(
                                CAST(aligned."waypoints/waypoints/position" AS DOUBLE[][])
                              ) WITH ORDINALITY AS waypoint(position, ordinality)
                            )
                          ) AS waypoints_geom
                        FROM
                          aligned
                          SEMI JOIN cam_front_left_meta
                          ON aligned."meta/ImageMetadata.cam_front_left/frame_idx"
                          = cam_front_left_meta.frame_idx
                        WHERE
                          COLUMNS(*) IS NOT NULL
                      ),
                      normalized_geometries AS (
                        SELECT
                          *,
                          ST_Rotate(
                            ST_Translate(waypoints_geom, -ST_X(ego_geom), -ST_Y(ego_geom)),
                            radians("meta/Gnss/heading")
                          ) AS normalized_waypoints_geom
                        FROM
                          base_data
                      )
                    SELECT
                      * EXCLUDE (
                        ego_geom,
                        waypoints_geom,
                        normalized_waypoints_geom,
                        "waypoints/waypoints/position",
                      ),
                      [["meta/Gnss/latitude", "meta/Gnss/longitude"]] AS "meta/Gnss/lat_lon",
                      (
                        SELECT
                          list([ST_X(p.point_struct.geom), ST_Y(p.point_struct.geom)] ORDER BY p.point_struct.path)
                        FROM
                          UNNEST(ST_Dump(waypoints_geom)) AS p(point_struct)
                      ) AS "waypoints/xy",
                      (
                        SELECT
                          list([ST_X(p.point_struct.geom) / 100, ST_Y(p.point_struct.geom) / 100] ORDER BY p.point_struct.path)
                        FROM
                          UNNEST(ST_Dump(normalized_waypoints_geom)) AS p(point_struct)
                      ) AS "waypoints/xy_normalized",
                      (
                        SELECT
                          list([ST_X(p.point_struct.geom), ST_Y(p.point_struct.geom)] ORDER BY p.point_struct.path)
                        FROM
                          UNNEST(ST_Dump(ST_Transform(waypoints_geom, 'EPSG:25832', 'EPSG:4326', always_xy := false))) AS p(point_struct)
                      ) AS "waypoints/xy_viz"
                    FROM
                      normalized_geometries
                    -- WHERE
                    --   ST_Contains(
                    --     ST_MakeEnvelope(-150, -150, 150, 150),
                    --     normalized_waypoints_geom
                    --   )
                    ORDER BY
                      "meta/ImageMetadata.cam_front_left/session_timestamp";

            - _target_: pipefunc.PipeFunc
              renames:
                input: filtered
              output_name: samples
              mapspec: "${.renames.input}[i] -> ${.output_name}[i]"
              func:
                _target_: rbyte.io.DataFrameGroupByDynamic
                index_column: meta/ImageMetadata.cam_front_left/frame_idx
                every: 10i
                period: 60i
                closed: left
                gather_every: 10
                #! label: left # TODO

            - _target_: pipefunc.PipeFunc
              output_name: samples_cast
              mapspec: "samples[i] -> ${.output_name}[i]"
              func:
                _target_: makefun.create_function
                func_signature: "cast(*, samples)"
                func_impl:
                  _target_: rbyte.io.DuckDBDataFrameQuery
                  query: |
                    SELECT
                       "meta/ImageMetadata.cam_front_left/session_timestamp"::UINT64[6]       AS "meta/ImageMetadata.cam_front_left/session_timestamp",
                       "meta/ImageMetadata.cam_front_left/frame_idx"        ::INT32[6]        AS "meta/ImageMetadata.cam_front_left/frame_idx",
                       "meta/VehicleMotion/speed"                           ::FLOAT[6]        AS "meta/VehicleMotion/speed",
                       "meta/VehicleMotion/gas_pedal_normalized"            ::FLOAT[6]        AS "meta/VehicleMotion/gas_pedal_normalized",
                       "meta/VehicleMotion/brake_pedal_normalized"          ::FLOAT[6]        AS "meta/VehicleMotion/brake_pedal_normalized",
                       "meta/VehicleMotion/steering_angle_normalized"       ::FLOAT[6]        AS "meta/VehicleMotion/steering_angle_normalized",
                       "meta/VehicleState/turn_signal"                      ::INT32[6]        AS "meta/VehicleState/turn_signal",
                       "waypoints/xy_normalized"                            ::FLOAT[2][10][6] AS "waypoints/xy_normalized",
                       "waypoints/xy"                                       ::FLOAT[2][10][6] AS "waypoints/xy",
                       "waypoints/xy_viz"                                   ::FLOAT[2][10][6] AS "waypoints/xy_viz",
                       "meta/Gnss/lat_lon"                                  ::FLOAT[2][1][6]  AS "meta/Gnss/lat_lon",
                       "meta/Gnss/heading"                                  ::FLOAT[6]        AS "meta/Gnss/heading"
                    FROM
                      samples
                    WHERE
                      len("meta/ImageMetadata.cam_front_left/frame_idx") == 6
                      AND list_last("meta/ImageMetadata.cam_front_left/frame_idx") - list_first("meta/ImageMetadata.cam_front_left/frame_idx") == 50

            - _target_: pipefunc.PipeFunc
              renames:
                keys: input_id
                values: samples_cast
              output_name: samples_aggregated
              func:
                _target_: rbyte.io.DataFrameConcater
                key_column: input_id

trainer:
  _target_: pytorch_lightning.Trainer
  _convert_: all
  accelerator: gpu
  devices: 1
  benchmark: true
  precision: "bf16-mixed"
  logger: false
  callbacks:
    - _target_: rmind.callbacks.PredictionConfigSetter
      config:
        objectives: [prediction_value]

    - _target_: rmind.callbacks.RerunPredictionWriter
      write_interval: batch
      logger:
        _target_: rbyte.viz.loggers.RerunLogger
        _convert_: all
        _recursive_: false
        application_id: test
        recording_id: test
        recording_name: test
        entity_path_format: "/{}/rmind"
        schema:
          gst/buffer/pts:
            _target_: rerun.TimeColumn
            columns:
              duration: [batch, data, meta/ImageMetadata.cam_front_left/session_timestamp]
            dtype: timedelta64[us]

          episode/camera/cam_front_left/5:
            - _target_: rerun.Image.columns
              columns:
                buffer:
                  path: [batch, data, cam_front_left]
                  index: "[:, 5, ...]"
              time_index: ${time_index}

            - static: true
              _target_: rerun.Image.from_fields
              fields:
                format:
                  _target_: rerun.components.ImageFormat
                  color_model: RGB
                  channel_datatype: f32
                  height: 256
                  width: 256

          episode/meta/gas_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/gas_pedal_normalized]
              time_index: ${time_index}

          episode/meta/brake_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/brake_pedal_normalized]
              time_index: ${time_index}

          episode/meta/steering_angle_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/steering_angle_normalized]
              time_index: ${time_index}

          episode/meta/speed:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleMotion/speed]
              time_index: ${time_index}

          episode/meta/turn_signal:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [batch, data, meta/VehicleState/turn_signal]
              time_index: ${time_index}

          episode/waypoints/xy_normalized:
            - _target_: rerun.LineStrips3D.columns
              columns:
                strips: [batch, data, waypoints/xy_normalized]
              time_index: ${time_index}

          meta/Gnss/lat_lon:
            - _target_: rerun.GeoPoints.columns
              columns:
                positions:
                  path: [batch, data, meta/Gnss/lat_lon]
                  index: "[:, 0, ...]"
              time_index: ${time_index}

          waypoints/WGS84:
            - _target_: rerun.GeoPoints.columns
              columns:
                positions:
                  path: [batch, data, waypoints/xy_viz]
                  index: "[:, 0, ...]"
              time_index: ${time_index}

          prediction/gas_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, continuous, gas_pedal]
              time_index: ${time_index}

          prediction/brake_pedal_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, continuous, brake_pedal]
              time_index: ${time_index}

          prediction/steering_angle_normalized:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, continuous, steering_angle]
              time_index: ${time_index}

          prediction/turn_signal:
            - _target_: rerun.Scalars.columns
              columns:
                scalars: [prediction, policy, prediction_value, value, discrete, turn_signal]
              time_index: ${time_index}
