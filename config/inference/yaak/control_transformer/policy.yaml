# @package _global_
---
defaults:
  - /model: yaak/control_transformer/finetuned
  - /datamodule: yaak/predict
  - /paths: yaak/default
  - /logger: yaak/rerun/prediction_policy
  - _self_

# Predict-time readout, injected into the saved hparams by /model finetuned.
# Override at the CLI, e.g. flow_predict_readout=mode flow_predict_samples=32.
flow_predict_readout: single
flow_predict_samples: 16

trainer:
  _target_: pytorch_lightning.Trainer
  _convert_: all
  accelerator: gpu
  devices: 1
  benchmark: true
  precision: "bf16-mixed"
  logger: false
  callbacks:
    - _target_: rmind.callbacks.PredictionConfigSetter
      config:
        objectives:
          - ground_truth
          - prediction_value
          - prediction_probs
          - score_l1
          - score_logprob
          - score_signed_error
          - score_l1_rel
          - prediction_diff_prev
          - ground_truth_diff_prev
          - prediction_diff_hist
          - ground_truth_diff_hist

    - _target_: rmind.callbacks.RerunPredictionWriter
      write_interval: batch
      logger: ${logger}

    - _target_: rmind.callbacks.DataFramePredictionWriter
      write_interval: batch
      path: ${hydra:run.dir}/predictions/${model.artifact}/{batch_idx:06}.parquet
      select:
        - [batch, data, meta/ImageMetadata.cam_front_left/time_stamp]
        - [batch, data, meta/ImageMetadata.cam_front_left/frame_idx]
        - [batch, data, meta/VehicleMotion/speed]
        - [batch, meta, input_id]
        - [policy, ground_truth, value]
        - [policy, prediction_value, value]
        - [policy, prediction_probs, value]
        - [policy, score_l1, value]
        - [policy, score_logprob, value]
        - [policy, score_l1_rel, value]
        - [policy, score_signed_error, value]
        - [policy, prediction_diff_prev, value]
        - [policy, ground_truth_diff_prev, value]
        - [policy, prediction_diff_hist, value]
        - [policy, ground_truth_diff_hist, value]
      writer:
        _target_: polars.DataFrame.write_parquet
        _partial_: true
    - _target_: pytorch_lightning.callbacks.ModelSummary
      max_depth: 5
