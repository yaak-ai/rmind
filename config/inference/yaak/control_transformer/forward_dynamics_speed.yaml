# @package _global_
---
defaults:
  - /model: yaak/control_transformer/pretrained
  - /datamodule: yaak/predict
  - /paths: yaak/default
  - /logger: yaak/rerun/prediction_pretrain
  - _self_

model:
  hparams_jq: |
    delpaths([
      ["objectives", "inverse_dynamics", "losses"],
      ["objectives", "forward_dynamics", "losses"],
      ["objectives", "memory_extraction", "losses"],
      ["lr_scheduler"]
    ])
    | setpath(
        ["episode_builder", "input_transform", "_args_", 0, "paths", "context", "waypoints"];
        ["data", "waypoints/xy_normalized"]
    )

trainer:
  _target_: pytorch_lightning.Trainer
  _convert_: all
  accelerator: gpu
  devices: 1
  benchmark: true
  precision: "bf16-mixed"
  logger: false
  callbacks:
    - _target_: rmind.callbacks.PredictionConfigSetter
      config:
        objectives:
          - ground_truth
          - prediction_value
          - score_l1
          - score_logprob

    - _target_: rmind.callbacks.DataFramePredictionWriter
      write_interval: batch
      path: ${hydra:run.dir}/predictions/${oc.select:model.artifact,}/{batch_idx:06}.parquet
      select:
        - [batch, data, meta/sample_id]
        - [batch, data, meta/ImageMetadata.cam_front_left/time_stamp]
        - [batch, data, meta/ImageMetadata.cam_front_left/frame_idx]
        - [batch, data, meta/VehicleMotion/speed]
        - [forward_dynamics, ground_truth, value, continuous, speed]
        - [forward_dynamics, prediction_value, value, continuous, speed]
        - [forward_dynamics, score_l1, value, continuous, speed]
        - [forward_dynamics, score_logprob, value, continuous, speed]
      writer:
        _target_: polars.DataFrame.write_parquet
        _partial_: true
    - _target_: pytorch_lightning.callbacks.ModelSummary
      max_depth: 5
