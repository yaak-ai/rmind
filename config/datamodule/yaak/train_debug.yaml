---
defaults:
  - /dataset/yaak/train_debug@train.dataset
  - /dataset/yaak/train_debug@val.dataset
  - _self_

_target_: rmind.datamodules.GenericDataModule
train:
  _target_: rmind.components.dataloader.DistributedTorchDataNodeDataLoader
  batch_size: 2
  shuffle: true
  drop_last: true
  collate_fn:
    _target_: rbyte.types.Batch.to_dict
    _partial_: true
  pin_memory: true
  num_workers: 2
  method: thread

val:
  _target_: rmind.components.dataloader.DistributedTorchDataNodeDataLoader
  batch_size: 2
  shuffle: false
  collate_fn:
    _target_: rbyte.types.Batch.to_dict
    _partial_: true
  pin_memory: true
  num_workers: 2
  method: thread
