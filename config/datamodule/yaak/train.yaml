---
defaults:
  - /dataset/yaak/train@train.dataset
  - /dataset/yaak/val@val.dataset
  - _self_

_target_: rmind.datamodules.GenericDataModule
train:
  _target_: rmind.components.dataloader.DistributedTorchDataNodeDataLoader
  batch_size: 64
  shuffle: true
  drop_last: true
  collate_fn:
    _target_: rbyte.types.Batch.to_dict
    _partial_: true
  pin_memory: true
  num_workers: 2
  method: thread

val:
  _target_: rmind.components.dataloader.DistributedTorchDataNodeDataLoader
  batch_size: 32
  shuffle: true
  collate_fn:
    _target_: rbyte.types.Batch.to_dict
    _partial_: true
  pin_memory: true
  num_workers: 2
  method: thread
