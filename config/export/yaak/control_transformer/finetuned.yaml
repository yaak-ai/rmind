# @package _global_
---
model:
  _target_: rmind.models.control_transformer.ControlTransformer.load_from_wandb_artifact
  artifact: ???
  filename: model.ckpt
  map_location: cpu
  strict: false
  hparams_jq: |
    delpaths([
      paths | select(.. | type == "string" and endswith("_diff")),
      ["episode_builder", "input_transform", "_args_", 1]
    ])

input:
  data:
    cam_front_left:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 256, 256, 3]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float
      device: cpu
      low: 0
      high: 1

    meta/VehicleMotion/brake_pedal_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 1

    meta/VehicleMotion/gas_pedal_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 1

    meta/VehicleMotion/steering_angle_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: -1
      high: 1

    meta/VehicleMotion/speed:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 130

    meta/VehicleState/turn_signal:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.int32
      device: cpu
      low: 0
      high: 3

    waypoints/xy_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 10, 2]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 20

input_names:
  - cam_front_left
  - brake_pedal_normalized
  - gas_pedal_normalized
  - steering_angle_normalized
  - speed
  - turn_signal
  - waypoints_xy_normalized
