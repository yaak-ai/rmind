# @package _global_
---
# HEADS export: deterministic engine emitting raw code-logits + offset-table so
# decode (incl. stochastic/entropy-gated sampling) runs host-side in drivr. Point
# checkpoint_path at any finetuned ckpt (no calibration needed for heads).
model:
  _target_: rmind.models.control_transformer.ControlTransformer.load_from_checkpoint
  checkpoint_path: ${oc.env:HEADS_CKPT}
  map_location: cpu
  strict: false
  hparams_jq: |
    delpaths([paths | select(.. | type == "string" and endswith("_diff")), ["episode_builder", "input_transform", "_args_", 1]])
    | .episode_builder.input_transform._args_[1].modules.image = {"_target_": "torchvision.transforms.v2.Normalize", "mean": [0.485, 0.456, 0.406], "std": [0.229, 0.224, 0.225]}
    | .objectives.modules.policy.sample_codes = false
    | .objectives.modules.policy.decode_strategy = "heads"

input:
  data:
    cam_front_left:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 3, 256, 256]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float
      device: cpu
      low: 0
      high: 1

    meta/VehicleMotion/brake_pedal_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 1

    meta/VehicleMotion/gas_pedal_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 1

    meta/VehicleMotion/steering_angle_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: -1
      high: 1

    meta/VehicleMotion/speed:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 130

    meta/VehicleState/turn_signal:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 1]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.int32
      device: cpu
      low: 0
      high: 3

    waypoints/xy_normalized:
      _target_: torch.testing.make_tensor
      _args_: [1, 6, 10, 2]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
      device: cpu
      low: 0
      high: 20

output_names:
  - code_logits
  - offsets

input_names:
  - cam_front_left
  - brake_pedal_normalized
  - gas_pedal_normalized
  - steering_angle_normalized
  - speed
  - turn_signal
  - waypoints_xy_normalized
