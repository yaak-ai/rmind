#@yaml/text-templated-strings

#@ drives = [
#@    'Niro115-HQ/2023-05-16--10-47-33',
#@    'Niro104-HQ/2022-12-20--13-57-20',
#@    'Niro107-HQ/2023-05-12--12-05-15',
#@    'Niro122-HQ/2023-04-05--12-06-39',
#@    'Niro102-HQ/2022-12-03--11-30-20',
#@ ]

#@ cameras = [
#@     'cam_front_left',
#@ ]
---
_target_: rbyte.Dataset
_recursive_: false
_convert_: all
sources:
  #@ for input_id in drives:
  (@=input_id@):
    #@ for camera in cameras:
    (@=camera@):
      index_column: "ImageMetadata.(@=camera@).frame_idx"
      source:
        _target_: rbyte.io.PathTensorSource
        path: "${paths.data}/(@=input_id@)/frames/(@=camera@).defish.mp4/576x324/{:09d}.jpg"
        decoder:
          _target_: simplejpeg.decode_jpeg
          _partial_: true
          colorspace: rgb
          fastdct: true
          fastupsample: true
    #@ end
  #@ end

samples:
  inputs:
    #@ for input_id in drives:
    (@=input_id@):
      yaak_metadata_path: ${paths.data}/(@=input_id@)/metadata.log
      #@ for camera in cameras:
      (@=camera@)_path: ${paths.data}/(@=input_id@)/frames/(@=camera@).defish.mp4/576x324
      #@ end
    #@ end

  executor:
    _target_: concurrent.futures.ProcessPoolExecutor
    mp_context:
      _target_: multiprocessing.get_context
      method: forkserver

  storage: shared_memory_dict
  scheduling_strategy: eager
  persist_memory: false

  pipeline:
    _target_: pipefunc.Pipeline
    validate_type_annotations: false
    cache_type: disk
    cache_kwargs:
      cache_dir: ${paths.rbyte.cache}
    functions:
      - _target_: pipefunc.PipeFunc
        renames:
          path: yaak_metadata_path
        output_name: data
        mapspec: "yaak_metadata_path[i] -> data[i]"
        cache: true
        func:
          _target_: rbyte.io.YaakMetadataDataFrameBuilder
          fields:
            rbyte.io.yaak.proto.sensor_pb2.ImageMetadata:
              time_stamp:
                _target_: polars.Datetime
                time_unit: ns

              frame_idx:
                _target_: polars.Int32

              camera_name:
                _target_: polars.Enum
                categories:
                  - cam_front_center
                  - cam_front_left
                  - cam_front_right
                  - cam_left_forward
                  - cam_right_forward
                  - cam_left_backward
                  - cam_right_backward
                  - cam_rear

            rbyte.io.yaak.proto.can_pb2.VehicleState:
              time_stamp:
                _target_: polars.Datetime
                time_unit: ns

              turn_signal:
                _target_: polars.Int8

            rbyte.io.yaak.proto.can_pb2.VehicleMotion:
              time_stamp:
                _target_: polars.Datetime
                time_unit: ns

              speed:
                _target_: polars.Float32

              gas_pedal_normalized:
                _target_: polars.Float32

              brake_pedal_normalized:
                _target_: polars.Float32

              steering_angle_normalized:
                _target_: polars.Float32

              gear:
                _target_: polars.Enum
                categories: ["0", "1", "2", "3"]

      - _target_: pipefunc.PipeFunc
        renames:
          input: data
        output_name: aligned
        mapspec: "data[i] -> aligned[i]"
        func:
          _target_: rbyte.io.DataFrameAligner
          separator: .
          fields:
            ImageMetadata.(@=cameras[0]@):
              key: time_stamp

            #@ for camera in cameras[1:]:
            ImageMetadata.(@=camera@):
              key: time_stamp
              columns:
                frame_idx:
                  method: asof
                  tolerance: 10ms
                  strategy: nearest
            #@ end

            VehicleState:
              key: time_stamp
              columns:
                turn_signal:
                  method: asof
                  tolerance: 100ms

            VehicleMotion:
              key: time_stamp
              columns:
                speed:
                  method: interp
                gas_pedal_normalized:
                  method: interp
                brake_pedal_normalized:
                  method: interp
                steering_angle_normalized:
                  method: interp
                gear:
                  method: asof
                  tolerance: 100ms
                  strategy: nearest

      #@ for camera in cameras:
      - _target_: pipefunc.PipeFunc
        renames:
          path: (@=camera@)_path
        output_name: (@=camera@)_meta
        mapspec: "(@=camera@)_path[i] -> (@=camera@)_meta[i]"
        cache: true
        func:
          _target_: rbyte.io.PathDataFrameBuilder
          pattern: (?<frame_idx>\d+).jpg
          fields:
            frame_idx:
              _target_: polars.Int32
      #@ end

      - _target_: pipefunc.PipeFunc
        output_name: query_context
        mapspec: #@ ", ".join(["aligned[i]"] + ["{}_meta[i]".format(camera) for camera in cameras]) + " -> query_context[i]"
        func:
          _target_: pipefunc.helpers.collect_kwargs
          parameters: #@ ["aligned"] + ["{}_meta".format(camera) for camera in cameras]

      - _target_: pipefunc.PipeFunc
        renames:
          context: query_context
        output_name: filtered
        mapspec: "query_context[i] -> filtered[i]"
        func:
          _target_: rbyte.io.DataFrameDuckDbQuery
        bound:
          query: |
            SELECT * EXCLUDE "VehicleMotion.gear"
            FROM aligned
              SEMI JOIN cam_front_left_meta
                ON aligned."ImageMetadata.cam_front_left.frame_idx" = cam_front_left_meta.frame_idx

            WHERE COLUMNS(*) IS NOT NULL
              AND aligned."VehicleMotion.gear" == '3'
              AND aligned."VehicleMotion.speed" BETWEEN 0.0 AND 130.0
              AND aligned."VehicleMotion.gas_pedal_normalized" BETWEEN 0.0 AND 1.0
              AND aligned."VehicleMotion.brake_pedal_normalized" BETWEEN 0.0 AND 1.0
              AND aligned."VehicleMotion.steering_angle_normalized" BETWEEN -1.0 AND 1.0

      - _target_: pipefunc.PipeFunc
        renames:
          input: filtered
        output_name: samples
        mapspec: "filtered[i] -> samples[i]"
        func:
          _target_: rbyte.io.DataFrameGroupByDynamic
          index_column: ImageMetadata.(@=cameras[0]@).frame_idx
          every: 10i
          period: 120i
          closed: left
          gather_every:
            ImageMetadata.cam_front_left.frame_idx: 10

      - _target_: pipefunc.PipeFunc
        renames:
          self: samples
        output_name: samples_filtered
        mapspec: "samples[i] -> samples_filtered[i]"
        func:
          _target_: hydra.utils.get_method
          path: polars.DataFrame.sql
        bound:
          query: |
            SELECT * FROM self WHERE array_length(`ImageMetadata.(@=cameras[0]@).time_stamp`) == 120
              AND NOT (
                    array_upper(`VehicleMotion.gas_pedal_normalized`) <= (1.0/255 + 0.001)
                AND array_upper(`VehicleMotion.brake_pedal_normalized`) <= (1.0/164 + 0.001)
                AND array_upper(`VehicleMotion.speed`) >= 25.0
                AND array_get(`VehicleMotion.speed`, -1) - array_get(`VehicleMotion.speed`, 1) >= -0.05 * array_mean(`VehicleMotion.speed`)
            )
