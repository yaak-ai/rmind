#@yaml/text-templated-strings

#@ drives = [
#@     'Niro115-HQ/2023-05-16--10-47-33',
#@     'Niro104-HQ/2022-12-20--13-57-20',
#@     'Niro107-HQ/2023-05-12--12-05-15',
#@     'Niro122-HQ/2023-04-05--12-06-39',
#@     'Niro102-HQ/2022-12-03--11-30-20',
#@ ]

---
_target_: rbyte.Dataset.from_config
_recursive_: false
_convert_: all
# action-only: no video stream → no frame decode
streams: {}

samples:
  inputs:
    input_id:
      #@ for/end drive_id in drives:
      - (@=drive_id@)

    yaak_metadata_path:
      #@ for/end drive_id in drives:
      - ${paths.data}/(@=drive_id@)/metadata.log

  executor:
    _target_: concurrent.futures.ProcessPoolExecutor
    mp_context:
      _target_: multiprocessing.get_context
      method: forkserver

  storage: file_array
  run_folder: ${paths.rbyte.cache}/yaak/action_val/samples
  scheduling_strategy: eager
  return_results: false
  persist_memory: false

  pipeline:
    _target_: pipefunc.Pipeline
    validate_type_annotations: false
    cache_type: disk
    cache_kwargs:
      cache_dir: ${paths.rbyte.cache}
    functions:
      - _target_: pipefunc.PipeFunc
        renames:
          path: yaak_metadata_path
        output_name: meta
        mapspec: "yaak_metadata_path[i] -> meta[i]"
        cache: true
        func:
          _target_: rbyte.io.YaakMetadataDataFrameBuilder
          fields:
            rbyte.io.yaak.proto.sensor_pb2.ImageMetadata:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              frame_idx:
                _target_: polars.Int32
              camera_name:
                _target_: polars.Enum
                categories:
                  - cam_front_center
                  - cam_front_left
                  - cam_front_right
                  - cam_left_forward
                  - cam_right_forward
                  - cam_left_backward
                  - cam_right_backward
                  - cam_rear

            rbyte.io.yaak.proto.can_pb2.VehicleState:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              turn_signal:
                _target_: polars.Int8

            rbyte.io.yaak.proto.can_pb2.VehicleMotion:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              speed:
                _target_: polars.Float32
              gas_pedal_normalized:
                _target_: polars.Float32
              brake_pedal_normalized:
                _target_: polars.Float32
              steering_angle_normalized:
                _target_: polars.Float32
              gear:
                _target_: polars.Enum
                categories: ["0", "1", "2", "3"]

      - _target_: pipefunc.PipeFunc
        output_name: aligned
        mapspec: "meta[i] -> aligned[i]"
        func:
          _target_: makefun.create_function
          func_signature: "align(*, meta)"
          func_impl:
            _target_: rbyte.io.DataFrameAligner
            separator: /
            fields:
              meta:
                ImageMetadata.cam_front_left:
                  key: time_stamp

                VehicleState:
                  key: time_stamp
                  columns:
                    turn_signal:
                      method: asof
                      tolerance: 100ms

                VehicleMotion:
                  key: time_stamp
                  columns:
                    speed:
                      method: interp
                    gas_pedal_normalized:
                      method: interp
                    brake_pedal_normalized:
                      method: interp
                    steering_angle_normalized:
                      method: interp
                    gear:
                      method: asof
                      tolerance: 100ms
                      strategy: nearest

      - _target_: pipefunc.PipeFunc
        output_name: filtered
        mapspec: "aligned[i] -> filtered[i]"
        func:
          _target_: makefun.create_function
          func_signature: "filter(*, aligned)"
          func_impl:
            _target_: rbyte.io.DuckDBDataFrameQuery
            query: |
              SELECT * EXCLUDE ("meta/VehicleMotion/gear")
              FROM aligned
              WHERE
                aligned."meta/VehicleMotion/gear" == '3'
                AND aligned."meta/VehicleMotion/speed" BETWEEN 0.0 AND 130.0
                AND aligned."meta/VehicleMotion/gas_pedal_normalized" BETWEEN 0.0 AND 1.0
                AND aligned."meta/VehicleMotion/brake_pedal_normalized" BETWEEN 0.0 AND 1.0
                AND aligned."meta/VehicleMotion/steering_angle_normalized" BETWEEN -1.0 AND 1.0
                AND COLUMNS(*) IS NOT NULL
              ORDER BY
                "meta/ImageMetadata.cam_front_left/time_stamp";

      # single timestep: no windowing → one scalar-valued sample per (downsampled) frame
      - _target_: pipefunc.PipeFunc
        output_name: samples_cast
        mapspec: "filtered[i] -> samples_cast[i]"
        func:
          _target_: makefun.create_function
          func_signature: "cast(*, filtered)"
          func_impl:
            _target_: rbyte.io.DuckDBDataFrameQuery
            query: |
              SELECT
                  "meta/ImageMetadata.cam_front_left/frame_idx"::INT32 AS "meta/ImageMetadata.cam_front_left/frame_idx",
                  "meta/VehicleMotion/speed"::FLOAT AS "meta/VehicleMotion/speed",
                  "meta/VehicleMotion/gas_pedal_normalized"::FLOAT AS "meta/VehicleMotion/gas_pedal_normalized",
                  "meta/VehicleMotion/brake_pedal_normalized"::FLOAT AS "meta/VehicleMotion/brake_pedal_normalized",
                  "meta/VehicleMotion/steering_angle_normalized"::FLOAT AS "meta/VehicleMotion/steering_angle_normalized",
                  "meta/VehicleState/turn_signal"::INT8 AS "meta/VehicleState/turn_signal",
              FROM
                  filtered
              WHERE
                  "meta/ImageMetadata.cam_front_left/frame_idx" % 10 == 0

      - _target_: pipefunc.PipeFunc
        renames:
          keys: input_id
          values: samples_cast
        output_name: samples_aggregated
        func:
          _target_: rbyte.io.DataFrameConcater
          key_column: input_id

      - _target_: pipefunc.PipeFunc
        output_name: samples_with_id
        renames:
          self: samples_aggregated
        func:
          _target_: polars.DataFrame.with_row_index
          _partial_: true
          name: meta/sample_id
