#@yaml/text-templated-strings

#@ drives = [
#@    'Niro096-HQ/2023-01-11--13-47-36',
#@    'Niro101-HQ/2022-12-25--09-58-33',
#@    'Niro101-HQ/2022-12-30--09-23-51',
#@ ]

---
_target_: rbyte.Dataset.from_config
_recursive_: false
_convert_: all
streams:
  cam_front_left:
    index: meta/ImageMetadata.cam_front_left/frame_idx
    sources:
      #@ for/end drive_id in drives:
      (@=drive_id@):
        _target_: rbyte.io.PathTensorSource
        path: "${paths.data}/(@=drive_id@)/frames/cam_front_left.pii.mp4/576x324/{:09d}.jpg"
        decoder:
          _target_: simplejpeg.decode_jpeg
          _partial_: true
          colorspace: rgb
          fastdct: true
          fastupsample: true

samples:
  inputs:
    input_id:
      #@ for/end drive_id in drives:
      - (@=drive_id@)

    yaak_metadata_path:
      #@ for/end drive_id in drives:
      - ${paths.data}/(@=drive_id@)/metadata.log

    waypoints_path:
      #@ for/end drive_id in drives:
      - ${paths.data}/(@=drive_id@)/waypoints.json

    headings_denoised_path:
      #@ for/end drive_id in drives:
      - ${paths.data}/(@=drive_id@)/headings_denoised.json

    cam_front_left_path:
      #@ for/end drive_id in drives:
      - ${paths.data}/(@=drive_id@)/frames/cam_front_left.pii.mp4/576x324

  executor:
    _target_: concurrent.futures.ProcessPoolExecutor
    mp_context:
      _target_: multiprocessing.get_context
      method: forkserver

  storage: file_array
  run_folder: ${paths.rbyte.cache}/yaak/train_debug/samples
  scheduling_strategy: eager
  return_results: false
  persist_memory: false

  pipeline:
    _target_: pipefunc.Pipeline
    validate_type_annotations: false
    cache_type: disk
    cache_kwargs:
      cache_dir: ${paths.rbyte.cache}
    functions:
      - _target_: pipefunc.PipeFunc
        renames:
          path: yaak_metadata_path
        output_name: meta
        mapspec: "yaak_metadata_path[i] -> meta[i]"
        cache: true
        func:
          _target_: rbyte.io.YaakMetadataDataFrameBuilder
          fields:
            rbyte.io.yaak.proto.sensor_pb2.ImageMetadata:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              frame_idx:
                _target_: polars.Int32
              camera_name:
                _target_: polars.Enum
                categories:
                  - cam_front_center
                  - cam_front_left
                  - cam_front_right
                  - cam_left_forward
                  - cam_right_forward
                  - cam_left_backward
                  - cam_right_backward
                  - cam_rear

            rbyte.io.yaak.proto.can_pb2.VehicleState:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              turn_signal:
                _target_: polars.Int8

            rbyte.io.yaak.proto.can_pb2.VehicleMotion:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              speed:
                _target_: polars.Float32
              gas_pedal_normalized:
                _target_: polars.Float32
              brake_pedal_normalized:
                _target_: polars.Float32
              steering_angle_normalized:
                _target_: polars.Float32
              gear:
                _target_: polars.Enum
                categories: ["0", "1", "2", "3"]

            rbyte.io.yaak.proto.sensor_pb2.Gnss:
              time_stamp:
                _target_: polars.Datetime
                time_unit: us
              latitude:
                _target_: polars.Float32
              longitude:
                _target_: polars.Float32

      - _target_: pipefunc.PipeFunc
        output_name: waypoints_raw
        mapspec: "waypoints_path[i] -> waypoints_raw[i]"
        func:
          _target_: makefun.create_function
          func_signature: "build_waypoints(*, waypoints_path)"
          func_impl:
            _target_: rbyte.io.DuckDBDataFrameQuery
            extensions: [spatial]
            config:
              TimeZone: UTC
            query: |
              SELECT TO_TIMESTAMP(timestamp)::TIMESTAMP AS timestamp,
                     ST_AsWKB(ST_Transform(geom, 'EPSG:4326', 'EPSG:25832', always_xy := true)) AS geometry
              FROM ST_Read($waypoints_path)

      - _target_: pipefunc.PipeFunc
        renames:
          input: waypoints_raw
        output_name: waypoints
        mapspec: "waypoints_raw[i] -> waypoints[i]"
        func:
          _target_: rbyte.io.WaypointBuilder
          length: 91
          columns:
            points: geometry
            output: xy

      - _target_: pipefunc.PipeFunc
        output_name: headings_denoised
        mapspec: "headings_denoised_path[i] -> headings_denoised[i]"
        cache: true
        func:
          _target_: makefun.create_function
          func_signature: "build_headings_denoised(*, headings_denoised_path)"
          func_impl:
            _target_: rbyte.io.DuckDBDataFrameQuery
            query: |
              SELECT make_timestamp(h.timestamp_us) AS timestamp, h.heading
              FROM (SELECT unnest(headings) AS h FROM read_json_auto($headings_denoised_path))

      - _target_: pipefunc.PipeFunc
        output_name: aligned
        mapspec: "meta[i], waypoints[i], headings_denoised[i] -> aligned[i]"
        func:
          _target_: makefun.create_function
          func_signature: "align(*, meta, waypoints, headings_denoised)"
          func_impl:
            _target_: rbyte.io.DataFrameAligner
            separator: /
            fields:
              meta:
                ImageMetadata.cam_front_left:
                  key: time_stamp

                VehicleState:
                  key: time_stamp
                  columns:
                    turn_signal:
                      method: asof
                      tolerance: 100ms

                VehicleMotion:
                  key: time_stamp
                  columns:
                    speed:
                      method: interp
                    gas_pedal_normalized:
                      method: interp
                    brake_pedal_normalized:
                      method: interp
                    steering_angle_normalized:
                      method: interp
                    gear:
                      method: asof
                      tolerance: 100ms
                      strategy: nearest

                Gnss:
                  key: time_stamp
                  columns:
                    latitude:
                      method: asof
                      tolerance: 500ms
                      strategy: nearest
                    longitude:
                      method: asof
                      tolerance: 500ms
                      strategy: nearest

              waypoints:
                key: timestamp
                columns:
                  xy:
                    method: asof
                    strategy: forward

              headings_denoised:
                key: timestamp
                columns:
                  heading:
                    method: asof
                    strategy: nearest

      - _target_: pipefunc.PipeFunc
        renames:
          path: cam_front_left_path
        output_name: cam_front_left_meta
        mapspec: "cam_front_left_path[i] -> cam_front_left_meta[i]"
        cache: true
        func:
          _target_: rbyte.io.PathDataFrameBuilder
          pattern: (?<frame_idx>\d+).jpg
          fields:
            frame_idx:
              _target_: polars.Int32

      - _target_: pipefunc.PipeFunc
        output_name: filtered
        mapspec: "aligned[i], cam_front_left_meta[i] -> filtered[i]"
        func:
          _target_: makefun.create_function
          func_signature: "filter(*, aligned, cam_front_left_meta)"
          func_impl:
            _target_: rbyte.io.DuckDBDataFrameQuery
            extensions: [spatial]
            query: |
              WITH
                base_data AS (
                  SELECT
                    *,
                    ST_Transform(
                      ST_Point("meta/Gnss/longitude", "meta/Gnss/latitude"),
                      'EPSG:4326', 'EPSG:25832', always_xy := true
                    ) AS ego_geom,
                    ST_GeomFromWKB("waypoints/xy") AS waypoints_geom
                  FROM
                    aligned
                    SEMI JOIN cam_front_left_meta
                    ON aligned."meta/ImageMetadata.cam_front_left/frame_idx"
                    = cam_front_left_meta.frame_idx
                  WHERE
                    aligned."meta/VehicleMotion/gear" == '3'
                    AND aligned."meta/VehicleMotion/speed" BETWEEN 0.0 AND 130.0
                    AND aligned."meta/VehicleMotion/gas_pedal_normalized" BETWEEN 0.0 AND 1.0
                    AND aligned."meta/VehicleMotion/brake_pedal_normalized" BETWEEN 0.0 AND 1.0
                    AND aligned."meta/VehicleMotion/steering_angle_normalized" BETWEEN -1.0 AND 1.0
                    AND COLUMNS(*) IS NOT NULL
                ),
                normalized_geometries AS (
                  SELECT
                    *,
                    ST_Rotate(
                      ST_Translate(
                        waypoints_geom,
                        - ST_X(ego_geom),
                        - ST_Y(ego_geom)
                      ),
                      radians("headings_denoised/heading")
                    ) AS normalized_waypoints_geom
                  FROM
                    base_data
                )
              SELECT
                * EXCLUDE (
                  "meta/VehicleMotion/gear",
                  "meta/VehicleMotion/brake_pedal_normalized",
                  waypoints_geom,
                  normalized_waypoints_geom,
                  ego_geom,
                  "waypoints/xy"
                ),
                -- Some vehicles (Niro106, Niro109, Niro110, Niro121, Niro124, Niro127, Niro132)
                -- have a constant brake sensor offset of up to ~4 quantisation steps (< 0.05)
                -- that reads as non-zero while the gas pedal is pressed. This is sensor noise,
                -- not real braking. Clamp it to zero so the model does not learn to predict
                -- spurious simultaneous brake+gas presses.
                IF(
                  ${oc.select:clamp_brake_pedal,1} = 1
                  AND "meta/VehicleMotion/brake_pedal_normalized" < 0.05
                  AND "meta/VehicleMotion/gas_pedal_normalized" > 0.0,
                  0.0,
                  "meta/VehicleMotion/brake_pedal_normalized"
                ) AS "meta/VehicleMotion/brake_pedal_normalized",
                [
                  ST_X(ego_geom),
                  ST_Y(ego_geom)
                ] AS "meta/Gnss/xy",
                  (
                  SELECT
                    list(
                      [ST_X(p.point_struct.geom), ST_Y(p.point_struct.geom)]
                      ORDER BY
                        p.point_struct.path
                    )
                  FROM
                    UNNEST(ST_Dump(waypoints_geom)) AS p(point_struct)
                  WHERE (p.point_struct.path[1] - 1) % 10 = 0
                ) AS "waypoints/xy",
                (
                  SELECT
                    list(
                      [ST_X(p.point_struct.geom) / 100, ST_Y(p.point_struct.geom) / 100]
                      ORDER BY
                        p.point_struct.path
                    )
                  FROM
                    UNNEST(ST_Dump(normalized_waypoints_geom)) AS p(point_struct)
                  WHERE (p.point_struct.path[1] - 1) % 10 = 0
                ) AS "waypoints/xy_normalized"
              FROM
                normalized_geometries
              WHERE
                ST_Contains(
                  ST_MakeEnvelope(-150, -150, 150, 150),
                  normalized_waypoints_geom
                )
              ORDER BY
                "meta/ImageMetadata.cam_front_left/time_stamp";

      - _target_: pipefunc.PipeFunc
        renames:
          input: filtered
        output_name: samples
        mapspec: "filtered[i] -> samples[i]"
        func:
          _target_: rbyte.io.DataFrameGroupByDynamic
          index_column: meta/ImageMetadata.cam_front_left/frame_idx
          every: 10i
          period: 110i
          closed: left
          gather_every: 10

      - _target_: pipefunc.PipeFunc
        output_name: samples_cast
        mapspec: "samples[i] -> samples_cast[i]"
        func:
          _target_: makefun.create_function
          func_signature: "cast(*, samples)"
          func_impl:
            _target_: rbyte.io.DuckDBDataFrameQuery
            query: |
              SELECT
                  "meta/ImageMetadata.cam_front_left/time_stamp"::TIMESTAMP[11] AS "meta/ImageMetadata.cam_front_left/time_stamp",
                  "meta/ImageMetadata.cam_front_left/frame_idx"::INT32[11] AS "meta/ImageMetadata.cam_front_left/frame_idx",
                  "meta/VehicleMotion/speed"::FLOAT[11] AS "meta/VehicleMotion/speed",
                  "meta/VehicleMotion/gas_pedal_normalized"::FLOAT[11] AS "meta/VehicleMotion/gas_pedal_normalized",
                  "meta/VehicleMotion/brake_pedal_normalized"::FLOAT[11] AS "meta/VehicleMotion/brake_pedal_normalized",
                  "meta/VehicleMotion/steering_angle_normalized"::FLOAT[11] AS "meta/VehicleMotion/steering_angle_normalized",
                  "meta/VehicleState/turn_signal"::INT8[11] AS "meta/VehicleState/turn_signal",
                  "meta/Gnss/xy"::FLOAT[2][11] AS "meta/Gnss/xy",
                  "headings_denoised/heading"::FLOAT[11] AS "headings_denoised/heading",
                  "waypoints/xy_normalized"::FLOAT[2][10][11] AS "waypoints/xy_normalized",
                  "waypoints/xy"::FLOAT[2][10][11] AS "waypoints/xy",
              FROM
                  samples
              WHERE
                  len("meta/ImageMetadata.cam_front_left/frame_idx") = 11
                  AND list_last("meta/ImageMetadata.cam_front_left/frame_idx") - list_first("meta/ImageMetadata.cam_front_left/frame_idx") == 100
                  AND NOT (
                      list_max("meta/VehicleMotion/gas_pedal_normalized") <= (1.0 / 255 + 0.001)
                      AND list_max("meta/VehicleMotion/brake_pedal_normalized") <= (1.0 / 164 + 0.001)
                      AND list_max("meta/VehicleMotion/speed") >= 25.0
                      AND list_last("meta/VehicleMotion/speed") - list_first("meta/VehicleMotion/speed") >= -0.05 * list_avg("meta/VehicleMotion/speed")
                  )
                  -- Drop episodes where any frame still has simultaneous non-zero gas
                  -- AND brake after the Stage-6 clamp. This catches vehicles with a
                  -- genuinely fluctuating brake signal (Niro101, Niro107, Niro112,
                  -- Niro115, Niro128, Niro130, Niro131) where the clamp does not
                  -- apply (brake > 0.05). Such conflicts are unrecoverable noise.
                  -- Disable with: +drop_pedal_conflict_episodes=0
                  AND (${oc.select:drop_pedal_conflict_episodes,1} = 0 OR len(list_filter(
                      list_zip(
                          "meta/VehicleMotion/gas_pedal_normalized",
                          "meta/VehicleMotion/brake_pedal_normalized"
                      ),
                      x -> x[1] > (1.0 / 255 + 0.001)
                           AND x[2] > (1.0 / 164 + 0.001)
                  )) = 0)

      - _target_: pipefunc.PipeFunc
        renames:
          keys: input_id
          values: samples_cast
        output_name: samples_aggregated
        func:
          _target_: rbyte.io.DataFrameConcater
          key_column: input_id

      - _target_: pipefunc.PipeFunc
        output_name: samples_with_id
        renames:
          self: samples_aggregated
        func:
          _target_: polars.DataFrame.with_row_index
          _partial_: true
          name: meta/sample_id
      - _target_: pipefunc.PipeFunc
        output_name: samples_scored
        renames:
          df: samples_with_id
        func:
          _target_: rmind.utils.pipeline.left_join_parquet
          _partial_: true
          path: "${oc.select:scores_parquet,''}"
          "on": "meta/sample_id"
          right_on: "batch/data/meta/sample_id"
          select:
            - "policy/loss/value/continuous/gas_pedal"
            - "policy/loss/value/continuous/brake_pedal"
            - "policy/loss/value/continuous/steering_angle"
      - _target_: pipefunc.PipeFunc
        output_name: samples_filtered
        renames:
          df: samples_scored
        func:
          _target_: rmind.utils.pipeline.drop_overrepresented_by_loss
          _partial_: true
          columns:
            - "policy/loss/value/continuous/gas_pedal"
            - "policy/loss/value/continuous/brake_pedal"
            - "policy/loss/value/continuous/steering_angle"
          max_bin_freq: "${oc.select:loss_max_bin_freq,1}"
