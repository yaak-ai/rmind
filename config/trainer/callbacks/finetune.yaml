- _target_: rmind.callbacks.LogitBiasSetter
- _target_: rmind.callbacks.ModuleFreezer
  paths:
    - episode_builder
    - encoder
- _target_: rmind.callbacks.WandbImageParamLogger
  when: on_validation_epoch_end
  key: policy/position_embedding_cosine
  select:
    - [objectives, policy, decoder, position_embedding, weight]
  apply:
    _target_: torchmetrics.functional.pairwise_cosine_similarity
    _partial_: true
- _target_: pytorch_lightning.callbacks.ModelSummary
  max_depth: 5
- _target_: pytorch_lightning.callbacks.ModelCheckpoint
  every_n_epochs: 1
  save_on_train_epoch_end: True
- _target_: pytorch_lightning.callbacks.LearningRateMonitor
  logging_interval: step
- _target_: rmind.callbacks.WandbAttentionMaskLogger
- _target_: rmind.callbacks.WandbWaypointsLogger
  when: on_train_batch_end
  every_n_batch: 100
  key: waypoints
  crs: "EPSG:25832"
  data:
    image: [data, cam_front_left, 0, -1]
    waypoints_xy_normalized: [data, waypoints/xy_normalized, 0, -1]
    waypoints_xy: [data, waypoints/xy, 0, -1]
    ego_xy: [data, meta/Gnss/xy, 0, -1]
  caption:
    input_id: [meta, input_id, 0]
    time_stamp: [data, meta/ImageMetadata.cam_front_left/time_stamp, 0, -1]
    frame_idx: [data, meta/ImageMetadata.cam_front_left/frame_idx, 0, -1]
- _target_: rmind.callbacks.PredictMetricsCallback
  prediction_config:
    objectives:
      - score_l1
      - score_signed_error
  cluster_fn:
    _target_: rmind.utils.RuleBasedCluster
    fields:
      gas:
        key: meta/VehicleMotion/gas_pedal_normalized
        reduce: last
      brake:
        key: meta/VehicleMotion/brake_pedal_normalized
        reduce: last
      steer:
        key: meta/VehicleMotion/steering_angle_normalized
        reduce: last
      dp_g:
        key: meta/VehicleMotion/gas_pedal_normalized
        reduce: last_diff
      speed:
        key: meta/VehicleMotion/speed
        reduce: last
    rules:
      - name: highway
        when: { speed: { ge: 70 } }
      - name: braking_turn
        when: { brake: { ge: 0.02 }, steer: { abs_ge: 0.05 } }
      - name: braking
        when: { brake: { ge: 0.02 }, steer: { abs_lt: 0.05 } }
      - name: cruise_turn
        when:
          { gas: { ge: 0.05 }, brake: { lt: 0.02 }, steer: { abs_ge: 0.05 } }
      - name: acceleration
        when: { gas: { ge: 0.05 }, brake: { lt: 0.02 }, dp_g: { ge: 0.01 } }
      - name: gas_release
        when: { gas: { ge: 0.05 }, brake: { lt: 0.02 }, dp_g: { lt: -0.01 } }
      - name: cruise
        when:
          {
            gas: { ge: 0.05 },
            brake: { lt: 0.02 },
            steer: { abs_lt: 0.05 },
            dp_g: { abs_lt: 0.01 },
          }
    default: idle_coast
  cluster_metrics:
    acceleration:
      - policy/score_l1/value/continuous/gas_pedal
      - policy/score_signed_error/value/continuous/gas_pedal
    cruise_turn:
      - policy/score_l1/value/continuous/steering_angle
    braking_turn:
      - policy/score_l1/value/continuous/brake_pedal
      - policy/score_l1/value/continuous/steering_angle
    braking:
      - policy/score_l1/value/continuous/brake_pedal
    highway:
      - policy/score_l1/value/continuous/gas_pedal
      - policy/score_signed_error/value/continuous/gas_pedal
