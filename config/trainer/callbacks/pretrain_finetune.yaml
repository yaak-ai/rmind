# Same callback set as trainer/callbacks/pretrain (only the TimmBackbone image
# encoder frozen -- everything else, incl. the policy head, trains together in
# this joint run), plus finetune.yaml's PredictMetricsCallback so policy
# metrics (score_l1/score_signed_error/prediction_std, clustered by driving
# scenario) still get logged the same way a normal policy finetune run would.
- _target_: rmind.callbacks.LogitBiasSetter
- _target_: rmind.callbacks.ModuleFreezer
  types:
    - rmind.components.timm_backbone.TimmBackbone
- _target_: pytorch_lightning.callbacks.TQDMProgressBar
- _target_: pytorch_lightning.callbacks.ModelSummary
  max_depth: 5
- _target_: pytorch_lightning.callbacks.ModelCheckpoint
  every_n_epochs: 1
  save_on_train_epoch_end: True
- _target_: pytorch_lightning.callbacks.LearningRateMonitor
  logging_interval: step
- _target_: rmind.callbacks.WandbAttentionMaskLogger
- _target_: rmind.callbacks.WandbImageParamLogger
  when: on_train_batch_end
  every_n_batch: 100
  key: similarity
  select:
    - [episode_builder, embeddings, continuous]
    - [episode_builder, embeddings, discrete]
    - [episode_builder, role_encoding, weight]
  apply:
    _target_: torchmetrics.functional.pairwise_cosine_similarity
    _partial_: true
- _target_: rmind.callbacks.WandbWaypointsLogger
  when: on_train_batch_end
  every_n_batch: 100
  key: waypoints
  crs: "EPSG:25832"
  data:
    image: [data, cam_front_left, 0, -1]
    waypoints_xy_normalized: [data, waypoints/xy_normalized, 0, -1]
    waypoints_xy: [data, waypoints/xy, 0, -1]
    ego_xy: [data, meta/Gnss/xy, 0, -1]
  caption:
    input_id: [meta, input_id, 0]
    time_stamp: [data, meta/ImageMetadata.cam_front_left/time_stamp, 0, -1]
    frame_idx: [data, meta/ImageMetadata.cam_front_left/frame_idx, 0, -1]
- _target_: rmind.callbacks.WandbPatchSimilarityLogger
  when: on_train_batch_end
  key: patch_similarities
  image_sources:
    cam_front_left: [foresight, cam_front_left]
  embeddings_predict: [forward_dynamics, _artifacts, last_embeddings]
  embeddings_target: [forward_dynamics, _artifacts, last_targets]
  sample_id_path: [data, meta/sample_id]
  every_n_sample: 1000
  patch_grid_size: 16
- _target_: rmind.callbacks.WandbPatchSimilarityLogger
  when: on_validation_batch_end
  key: patch_similarities
  image_sources:
    cam_front_left: [foresight, cam_front_left]
  embeddings_predict: [forward_dynamics, _artifacts, last_embeddings]
  embeddings_target: [forward_dynamics, _artifacts, last_targets]
  sample_id_path: [data, meta/sample_id]
  every_n_sample: 1000
  patch_grid_size: 16
- _target_: rmind.callbacks.WandbForesightMetricsLogger
  key: foresight
  image_sources:
    cam_front_left: [foresight, cam_front_left]
  embeddings_predict: [forward_dynamics, _artifacts, last_embeddings]
  embeddings_target: [forward_dynamics, _artifacts, last_targets]
  hot_quantile: 0.05
  max_hot_pairs: 50000
- _target_: rmind.callbacks.PredictMetricsCallback
  prediction_config:
    objectives:
      - score_l1
      - score_signed_error
      - prediction_std
  cluster_fn:
    _target_: rmind.utils.RuleBasedCluster
    fields:
      gas:
        key: meta/VehicleMotion/gas_pedal_normalized
        reduce: last
      brake:
        key: meta/VehicleMotion/brake_pedal_normalized
        reduce: last
      steer:
        key: meta/VehicleMotion/steering_angle_normalized
        reduce: last
      dp_g:
        key: meta/VehicleMotion/gas_pedal_normalized
        reduce: last_diff
      speed:
        key: meta/VehicleMotion/speed
        reduce: last
    rules:
      - name: highway
        when: {speed: {ge: 70}}
      - name: braking_turn
        when: {brake: {ge: 0.02}, steer: {abs_ge: 0.05}}
      - name: braking
        when: {brake: {ge: 0.02}, steer: {abs_lt: 0.05}}
      - name: cruise_turn
        when: {gas: {ge: 0.05}, brake: {lt: 0.02}, steer: {abs_ge: 0.05}}
      - name: acceleration
        when: {gas: {ge: 0.05}, brake: {lt: 0.02}, dp_g: {ge: 0.01}}
      - name: gas_release
        when: {gas: {ge: 0.05}, brake: {lt: 0.02}, dp_g: {lt: -0.01}}
      - name: cruise
        when: {gas: {ge: 0.05}, brake: {lt: 0.02}, steer: {abs_lt: 0.05}, dp_g: {abs_lt: 0.01}}
    default: idle_coast
  cluster_metrics:
    acceleration:
      - policy/score_l1/value/continuous/gas_pedal
      - policy/score_signed_error/value/continuous/gas_pedal
    cruise_turn:
      - policy/score_l1/value/continuous/steering_angle
    braking_turn:
      - policy/score_l1/value/continuous/brake_pedal
      - policy/score_l1/value/continuous/steering_angle
    braking:
      - policy/score_l1/value/continuous/brake_pedal
    highway:
      - policy/score_l1/value/continuous/gas_pedal
      - policy/score_signed_error/value/continuous/gas_pedal
